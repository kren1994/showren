<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>連珠 検討用ボード</title>
    <style>
        html {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            --bottom-controls-offset: calc(8px + env(safe-area-inset-bottom, 0px));
            --bottom-controls-height: 64px;
            --bottom-controls-space: calc(var(--bottom-controls-height) + var(--bottom-controls-offset));
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f4f9; margin: 0; padding: 10px; overscroll-behavior-y: none;
            display: flex; justify-content: center; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        .container {
            display: flex; gap: 20px; background: #fff; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-wrap: wrap; max-width: 100%; box-sizing: border-box;
        }
        .left-pane, .right-pane { flex: 1 1 100%; max-width: 650px; display: flex; flex-direction: column; gap: 10px; margin: 0 auto; }
        .right-pane { position: relative; min-height: 0; }
        .board-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .canvas-stack { position: relative; display: inline-block; }
        #bgCanvas {
            background-color: #e3c482; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            display: block; max-width: 100%; height: auto !important;
        }
        #boardCanvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            cursor: pointer; touch-action: none; border-radius: 4px; outline: none;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        #boardCanvas:focus, #boardCanvas:focus-visible { outline: none; }
        canvas, button, svg {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }
        .board-controls { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; width: 100%; box-sizing: border-box; max-width: 620px; margin: 0 auto; align-items: center; }
        .visually-hidden-file-input {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
        }
        .ctrl-left, .ctrl-center, .ctrl-right { display: flex; align-items: center; }
        .ctrl-left, .ctrl-right { gap: 6px; }
        .ctrl-center { gap: 8px; justify-content: center; min-width: 0; }
        .control-menu { position: relative; }
        .board-controls button, .label-action-btn, .label-form-btn {
            padding: 12px 14px; border: 1px solid #ccc; background: #f9f9f9;
            border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; touch-action: manipulation;
            white-space: nowrap; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .board-controls button:hover, .label-action-btn:hover, .label-form-btn:hover {
            background: #e9e9e9;
        }
        .menu-icon-btn {
            width: 52px; height: 48px; padding: 0; display: inline-flex; align-items: center; justify-content: center;
            color: #344054;
        }
        .menu-icon-btn.active { background: #eef4ff; border-color: #bfd2fb; color: #24488f; }
        .control-icon { display: inline-flex; width: 22px; height: 22px; }
        .control-icon svg { width: 100%; height: 100%; fill: currentColor; }
        .control-menu-popup {
            position: absolute; bottom: calc(100% + 8px); min-width: 144px; display: flex; flex-direction: column; gap: 0;
            padding: 5px; border: 1px solid #d7dde6; border-radius: 14px; background: rgba(252, 253, 255, 0.98);
            box-shadow: 0 14px 32px rgba(16, 24, 40, 0.14); z-index: 20;
        }
        .control-menu-popup[hidden] { display: none; }
        .control-menu.align-right .control-menu-popup { right: 0; }
        .control-menu:not(.align-right) .control-menu-popup { left: 0; }
        .board-controls .control-menu-item {
            width: 100%; text-align: left; padding: 12px 14px; font-size: 13px; font-weight: 600;
            appearance: none; -webkit-appearance: none;
            color: #344054; background: transparent; border: none; box-shadow: none; border-radius: 10px; outline: none;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .board-controls .control-menu-item[hidden] { display: none !important; }
        .board-controls .control-menu-item:hover { background: #f2f5fa; }
        .board-controls .control-menu-item:focus,
        .board-controls .control-menu-item:focus-visible { outline: none; }
        .board-controls .control-menu-item::after { content: ''; width: 1em; flex: 0 0 1em; }
        .board-controls .control-menu-item.active::after { content: '✓'; color: #667085; }
        .board-controls .control-menu-item.board-theme-item::after,
        .board-controls .control-menu-item.language-item::after { content: attr(data-value); width: auto; flex: 0 0 auto; color: #667085; }
        .nav-btn {
            padding: 0; display: inline-flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1; height: 48px;
        }
        .nav-btn.branch { width: 3.8em; letter-spacing: -0.08em; }
        .nav-btn.step { width: 4.7em; }
        textarea {
            width: 100%; flex-grow: 1; min-height: 150px; resize: none; overflow-y: auto; touch-action: pan-y; padding: 10px; font-size: 16px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none; background-color: #fff; color: #333;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }
        input, textarea, [contenteditable="true"], [contenteditable="plaintext-only"] {
            -webkit-user-select: text;
            user-select: text;
            -webkit-touch-callout: default;
        }
        body:not(.touch-main) textarea:focus,
        body:not(.touch-main) textarea:focus-visible {
            border-color: #7ab8f5;
            box-shadow: inset 0 0 0 2px rgba(100,170,240,0.35);
        }
        .hidden-hint { color: transparent !important; caret-color: transparent !important; }
        .hidden-hint::placeholder { color: transparent !important; }
        .guide { font-size: 13px; color: #666; line-height: 1.5; background: #f9f9fb; padding: 10px; border-radius: 4px; border: 1px solid #eee; }
        .side-tabs {
            display: inline-flex; gap: 2px; align-self: flex-start;
            padding: 2px; border-radius: 999px; background: #f2f4f7; border: 1px solid #e3e7ed;
            position: absolute; right: 0; bottom: 10px; z-index: 5;
            box-shadow: 0 10px 24px rgba(16, 24, 40, 0.12);
        }
        .side-tabs[hidden] { display: none !important; }
        .tab-btn {
            appearance: none; border: 0; background: transparent; color: #667085;
            border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
            cursor: pointer; user-select: none; -webkit-user-select: none;
        }
        .tab-btn:hover { color: #344054; background: rgba(255, 255, 255, 0.55); }
        .tab-btn.active { background: #fff; color: #101828; box-shadow: 0 1px 2px rgba(16, 24, 40, 0.08); }
        .tab-panel { display: none; flex: 1 1 0; min-height: 0; padding-bottom: 0; }
        .tab-panel.active { display: flex; flex-direction: column; }
        .comment-panel textarea { height: 100%; min-height: 0; }
        .position-labels-panel { gap: 10px; min-height: 0; }
        .label-register-panel, .label-list-panel { box-sizing: border-box; }
        .label-register-panel { padding: 0; display: flex; flex-direction: column; gap: 8px; }
        .label-list-panel { flex: 1 1 0; min-height: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; touch-action: pan-y; }
        .label-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr) minmax(72px, 0.55fr) auto; gap: 8px; align-items: stretch; }
        .label-field input {
            width: 100%; min-height: 38px; box-sizing: border-box; padding: 9px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .label-form-actions { display: contents; }
        .label-form-btn.primary {
            min-height: 38px; height: 100%; box-sizing: border-box; background: #eef4ff; border-color: #bfd2fb;
            color: #24488f; padding: 0 14px; align-self: stretch;
        }
        .label-leaf-delete { background: #fff; }
        .label-error {
            display: none; align-items: center; gap: 8px; flex-wrap: wrap;
            background: #fff2f0; border: 1px solid #f0b8b2; color: #9a3126; border-radius: 6px; padding: 8px 10px; font-size: 13px;
        }
        .label-error.active { display: flex; }
        .label-error button { padding: 7px 10px; font-size: 12px; }
        .label-tree {
            flex: 1 1 0; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
            touch-action: pan-y; -webkit-overflow-scrolling: touch; border: 0; border-radius: 4px;
            background: transparent; padding: 0;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
        }
        .label-empty { color: #666; font-size: 13px; padding: 8px 4px; }
        .label-group, .label-subgroup, .label-leaf { background: transparent; }
        .label-group-header, .label-subgroup-header, .label-leaf-row {
            display: flex; align-items: center; gap: 8px; width: 100%; box-sizing: border-box; padding: 7px 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .label-group-header, .label-subgroup-header {
            border-bottom: 1px solid #edf0f4;
        }
        .label-item-main {
            flex: 1 1 auto; min-width: 0; display: flex; align-items: center; gap: 8px;
            padding: 0; border: 0; background: transparent; color: #344054; text-align: left;
            font: inherit; cursor: pointer;
        }
        .label-item-main:hover { color: #101828; background: transparent; }
        .label-item-actions {
            flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: flex-end; gap: 2px;
            margin-left: auto;
        }
        .label-tree:focus {
            outline: none; border-color: #98b8f5;
            box-shadow: inset 0 0 0 2px rgba(126, 177, 255, 0.45);
            background: transparent;
        }
        .label-tree:focus-visible {
            outline: none; border-color: #98b8f5;
            box-shadow: inset 0 0 0 2px rgba(126, 177, 255, 0.45);
            background: transparent;
        }
        .label-item-focused {
            border-radius: 6px; background: #eef4ff;
            box-shadow: inset 0 0 0 1px #bfd2fb;
        }
        .label-toggle { width: 1.2em; text-align: center; color: #98a2b3; font-size: 11px; }
        .label-title { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
        .label-count { color: #98a2b3; font-size: 11px; font-weight: 500; }
        .label-subtree { display: flex; flex-direction: column; gap: 2px; padding: 2px 0 0 14px; }
        .label-leaf-row { border-bottom: 1px solid #f2f4f7; cursor: pointer; }
        .label-leaf-row.current { color: #184a9a; }
        .label-leaf-row.highlight { box-shadow: inset 2px 0 0 #7eb1ff; }
        .label-leaf-main { flex: 1 1 auto; display: flex; align-items: center; gap: 8px; min-width: 0; }
        .label-leaf-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; padding-left: 6px; }
        .label-action-btn {
            padding: 0 4px; font-size: 16px; line-height: 1; background: transparent; border: 0;
            color: #98a2b3; font-weight: 500; min-width: 1.2em;
        }
        .label-action-btn:hover { background: transparent; color: #667085; }
        .label-action-btn { color: #98a2b3; }
        .label-action-btn[disabled] { visibility: hidden; pointer-events: none; }
        body.touch-main .label-register-panel { display: none; }
        body.touch-main .container { flex-wrap: wrap; }
        body.touch-main .guide { display: none; }
        body.bottom-controls-layout .board-controls {
            position: fixed; left: 50%; bottom: var(--bottom-controls-offset); transform: translateX(-50%);
            width: min(620px, calc(100vw - 16px)); margin: 0; padding: 8px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.7); box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08); z-index: 30;
        }
        body.bottom-controls-layout.control-menu-open .board-controls { z-index: 40; }
        body.bottom-controls-layout .side-tabs {
            bottom: calc(84px + env(safe-area-inset-bottom, 0px));
            z-index: 31;
        }
        body.bottom-controls-layout .right-pane {
            padding-bottom: var(--bottom-controls-space);
        }
        body.bottom-controls-layout .comment-panel textarea {
            padding-bottom: 10px;
        }
        body.bottom-controls-layout .label-list-panel {
            padding-bottom: 0;
        }
        body.bottom-controls-layout .label-tree {
            padding-bottom: 0;
            box-sizing: border-box;
        }
        body.touch-main .position-labels-panel { gap: 0; }
        body.touch-main .label-list-panel { padding-top: 0; }
        body.touch-main .label-tree,
        body.touch-main .label-tree:focus,
        body.touch-main .label-tree:focus-visible {
            border: 0;
            box-shadow: none;
            background: transparent;
        }
        @media (max-width: 599px) {
            body { --bottom-controls-height: 58px; }
            .board-controls { grid-template-columns: 44px minmax(0, 1fr) 44px; gap: 6px; }
            .ctrl-left, .ctrl-right { gap: 0; }
            .ctrl-center { gap: 4px; }
            .menu-icon-btn { width: 44px; height: 42px; }
            .control-icon { width: 20px; height: 20px; }
            .nav-btn { height: 42px; }
            .nav-btn.branch { width: 3em; }
            .nav-btn.step { width: 4.5em; }
            .label-form-actions { display: block; }
            .label-grid { grid-template-columns: 1fr; }
            .side-tabs { right: 10px; bottom: 10px; }
        }
        @media (min-width: 600px) and (max-width: 1199px) {
            .ctrl-center { gap: 6px; }
            .nav-btn.branch { width: 3.6em; }
            .nav-btn.step { width: 5.1em; }
        }
        @media (max-width: 1199px) {
            html, body { height: 100%; overflow: hidden; }
            body { padding: 0; }
            .container { padding: 0; border-radius: 0; box-shadow: none; gap: 5px; width: 100%; height: 100%; flex-direction: column; flex-wrap: nowrap; overflow: hidden; }
            .board-container { padding-top: 10px; }
            .left-pane { flex: 0 0 auto; }
            .right-pane { flex: 1 1 0; min-height: 0; overflow: hidden; margin: 0 auto; width: 100%; max-width: 620px; padding: 0 0 10px; box-sizing: border-box; }
            .guide { display: none; }
            textarea { height: 100%; min-height: 0; margin: 0; width: 100%; line-height: 1.45; }
        }
        @media (min-width: 1200px) {
            .container { flex-wrap: nowrap; }
            .left-pane { width: 620px; flex: 0 0 auto; }
            .right-pane { width: 416px; flex: 0 0 auto; }
            textarea { min-height: 300px; line-height: 1.45; }
            .label-field input:focus {
                border-color: #7ab8f5; box-shadow: 0 0 0 3px rgba(100,170,240,0.25);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-pane">
        <div class="board-container"><div class="canvas-stack"><canvas id="bgCanvas"></canvas><canvas id="boardCanvas"></canvas></div></div>
        <div class="board-controls">
            <div class="ctrl-left">
                <div class="control-menu">
                    <button id="fileMenuBtn" class="menu-icon-btn" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="ファイル操作" onclick="toggleControlMenu('file')">
                        <span class="control-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zm0 2.5L17.5 8H14zM8 12h8v1.5H8zm0 3h8v1.5H8zm0-6h4v1.5H8z"/></svg>
                        </span>
                    </button>
                    <div id="fileMenu" class="control-menu-popup" hidden>
                        <button id="languageActionBtn" class="control-menu-item language-item" type="button" onclick="cycleLanguageFromMenu()" data-value="日">言語</button>
                        <button id="fileDeleteMoveActionBtn" class="control-menu-item" type="button" onclick="deleteCurrentNodeFromMenu()">一手削除</button>
                        <button id="fileOpenActionBtn" class="control-menu-item" type="button" onclick="openFileFromMenu()">読込</button>
                        <button id="fileExportActionBtn" class="control-menu-item" type="button" onclick="exportKifuFromMenu()" hidden>書出</button>
                        <button id="fileSaveActionBtn" class="control-menu-item" type="button" onclick="saveKifuWithConfirmFromMenu()">保存</button>
                    </div>
                </div>
            </div>
            <div class="ctrl-center">
                <button class="nav-btn branch" type="button" onclick="goToPrevBranch()">&lt;&lt;</button>
                <button class="nav-btn step" type="button" onclick="goBack()">&lt;</button>
                <button class="nav-btn step" type="button" onclick="goNext()">&gt;</button>
                <button class="nav-btn branch" type="button" onclick="goToNextBranch()">&gt;&gt;</button>
            </div>
            <div class="ctrl-right">
                <div class="control-menu align-right">
                    <button id="viewMenuBtn" class="menu-icon-btn" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="表示操作" onclick="toggleControlMenu('view')">
                        <span class="control-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M12 5c5.27 0 9.4 4.18 10.58 6.5C21.4 13.82 17.27 18 12 18S2.6 13.82 1.42 11.5C2.6 9.18 6.73 5 12 5m0-2C5.73 3 1 8.5 1 11.5S5.73 20 12 20s11-5.5 11-8.5S18.27 3 12 3m0 4.5A4.5 4.5 0 1 0 16.5 12 4.5 4.5 0 0 0 12 7.5m0 2A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5"/></svg>
                        </span>
                    </button>
                    <div id="viewMenu" class="control-menu-popup" hidden>
                        <button id="toggleCoordsActionBtn" class="control-menu-item" type="button" onclick="toggleCoordsFromMenu()">座標</button>
                        <button id="cycleBoardThemeActionBtn" class="control-menu-item board-theme-item" type="button" onclick="cycleBoardThemeFromMenu()" data-value="茶系">盤面色</button>
                        <button id="toggleSideTabsActionBtn" class="control-menu-item" type="button" onclick="toggleSideTabsFromMenu()">タブ</button>
                        <button id="toggleMoveNumbersActionBtn" class="control-menu-item" type="button" onclick="toggleMoveNumbersFromMenu()">手数</button>
                        <button id="toggleHintsActionBtn" class="control-menu-item" type="button" onclick="toggleHintsFromMenu()">記号等</button>
                    </div>
                </div>
            </div>
            <input type="file" id="fileInput" class="visually-hidden-file-input" accept=".json" tabindex="-1" aria-hidden="true">
        </div>
    </div>
    <div class="right-pane">
        <div id="guideText" class="guide">
            ・<b>Delete</b> で 1 手削除 / <b>Ctrl+F</b> で記号等表示切替<br>
            ・<b>Ctrl+O</b> で読込 / <b>Ctrl+S</b> で書出 / <b>Ctrl+Shift+S</b> でブラウザに保存<br>
            ・<b>Ctrl+;</b> でコメント入力切替 / <b>Ctrl+Shift+;</b>でタブ切替
        </div>
        <div class="side-tabs" hidden>
            <button id="commentTabBtn" class="tab-btn active" type="button" onclick="setActiveSideTab('comment')">コメント</button>
            <button id="positionLabelsTabBtn" class="tab-btn" type="button" onclick="setActiveSideTab('labels')">索引</button>
        </div>
        <div id="commentPanel" class="tab-panel comment-panel active">
            <textarea id="commentArea"></textarea>
        </div>
        <div id="positionLabelsPanel" class="tab-panel position-labels-panel">
            <div class="label-register-panel">
                <div class="label-grid">
                    <div class="label-field">
                        <input id="labelInput1" list="labelK1Options" type="text" autocomplete="off" placeholder="例：2026">
                        <datalist id="labelK1Options"></datalist>
                    </div>
                    <div class="label-field">
                        <input id="labelInput2" list="labelK2Options" type="text" autocomplete="off" placeholder="例：珠王戦">
                        <datalist id="labelK2Options"></datalist>
                    </div>
                    <div class="label-field">
                        <input id="labelInput3" type="text" autocomplete="off" placeholder="例：1">
                    </div>
                    <div class="label-form-actions">
                        <button id="registerPositionLabelBtn" type="button" class="label-form-btn primary" onclick="registerCurrentPositionLabel()">登録</button>
                    </div>
                </div>
                <div id="positionLabelError" class="label-error">
                    <span id="positionLabelErrorText"></span>
                    <button id="positionLabelErrorAction" type="button"></button>
                </div>
            </div>
            <div class="label-list-panel">
                <div id="positionLabelsTree" class="label-tree" tabindex="0" role="tree" aria-label="局面ラベル"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const BOARD_SIZE = 15;
    let CELL_SIZE = 40, MARGIN_L = 35, MARGIN_R = 25, MARGIN_T = 25, MARGIN_B = 35;
    if (window.innerWidth <= 599) {
        MARGIN_T += 5;
    }
    const LOGICAL_W = 620, LOGICAL_H = 620;
    const naturalCollator = new Intl.Collator('ja', { numeric: true, sensitivity: 'base' });

    const canvas = document.getElementById('boardCanvas');
    canvas.tabIndex = 0;
    const ctx = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const container = document.querySelector('.container');
    const commentArea = document.getElementById('commentArea');
    const leftPane = document.querySelector('.left-pane');
    const rightPane = document.querySelector('.right-pane');
    const boardControls = document.querySelector('.board-controls');
    const fileMenuBtn = document.getElementById('fileMenuBtn');
    const fileMenu = document.getElementById('fileMenu');
    const languageActionBtn = document.getElementById('languageActionBtn');
    const fileDeleteMoveActionBtn = document.getElementById('fileDeleteMoveActionBtn');
    const fileOpenActionBtn = document.getElementById('fileOpenActionBtn');
    const fileExportActionBtn = document.getElementById('fileExportActionBtn');
    const fileSaveActionBtn = document.getElementById('fileSaveActionBtn');
    const viewMenuBtn = document.getElementById('viewMenuBtn');
    const viewMenu = document.getElementById('viewMenu');
    const cycleBoardThemeActionBtn = document.getElementById('cycleBoardThemeActionBtn');
    const toggleSideTabsActionBtn = document.getElementById('toggleSideTabsActionBtn');
    const toggleHintsActionBtn = document.getElementById('toggleHintsActionBtn');
    const toggleCoordsActionBtn = document.getElementById('toggleCoordsActionBtn');
    const toggleMoveNumbersActionBtn = document.getElementById('toggleMoveNumbersActionBtn');
    const guideText = document.getElementById('guideText');
    const sideTabs = document.querySelector('.side-tabs');
    const commentTabBtn = document.getElementById('commentTabBtn');
    const positionLabelsTabBtn = document.getElementById('positionLabelsTabBtn');
    const commentPanel = document.getElementById('commentPanel');

    function transform(cx, cy, i) {
        const last = BOARD_SIZE - 1;
        switch(i) {
            case 0: return [cx, cy];
            case 1: return [cy, last-cx];
            case 2: return [last-cx, last-cy];
            case 3: return [last-cy, cx];
            case 4: return [last-cx, cy];
            case 5: return [cx, last-cy];
            case 6: return [cy, cx];
            case 7: return [last-cy, last-cx];
        }
    }

    function inverseTransform(px, py, i) {
        const last = BOARD_SIZE - 1;
        switch(i) {
            case 0: return [px, py];
            case 1: return [last-py, px];
            case 2: return [last-px, last-py];
            case 3: return [py, last-px];
            case 4: return [last-px, py];
            case 5: return [px, last-py];
            case 6: return [py, px];
            case 7: return [last-py, last-px];
        }
    }

    function encodeBoard(s, color) {
        const bytes = new Uint8Array(45);
        for (let i = 0; i < 45; i++) {
            let v = 0;
            for (let j = 0; j < 5; j++) v = v * 3 + +s[i * 5 + j];
            bytes[i] = v;
        }
        return btoa(String.fromCharCode(...bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '') + color;
    }

    const canonicalCache = {};
    let cacheSize = 0;
    const MAX_CACHE = 5000;

    function clearCanonicalCache() {
        for (let key in canonicalCache) delete canonicalCache[key];
        cacheSize = 0;
    }

    function getCanonicalInfo(nodeId) {
        if (canonicalCache[nodeId]) return canonicalCache[nodeId];

        let grid = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let curr = tree[nodeId];
        while (curr && curr.i !== 'r') {
            grid[curr.x][curr.y] = curr.o;
            curr = tree[curr.p];
        }
        const nextColor = tree[nodeId].m % 2 === 0 ? 1 : 2;
        let bestS = null, best = null;
        for (let i = 0; i < 8; i++) {
            let s = '';
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const [tx, ty] = transform(x, y, i);
                    s += grid[tx][ty];
                }
            }
            if (!bestS || s < bestS) {
                bestS = s;
                best = { key: encodeBoard(s, nextColor), index: i };
            }
        }
        canonicalCache[nodeId] = best;
        cacheSize++;
        if (cacheSize > MAX_CACHE) {
            for (let key in canonicalCache) delete canonicalCache[key];
            cacheSize = 0;
        }
        return best;
    }

    function buildFilteredPositionLabelTree() {
        const roots = {};
        for (const [posKey, entry] of Object.entries(positionLabels.byPosKey)) {
            if (!roots[entry.k1]) roots[entry.k1] = { count: 0, children: {} };
            if (!roots[entry.k1].children[entry.k2]) roots[entry.k1].children[entry.k2] = { count: 0, leaves: [] };
            roots[entry.k1].count += 1;
            roots[entry.k1].children[entry.k2].count += 1;
            roots[entry.k1].children[entry.k2].leaves.push({ posKey, entry });
        }
        return roots;
    }

    function getVisibleLabelItemIndex(itemKey) {

    }

    function ensureFocusedLabelItem(currentPosKey) {
        if (!visiblePositionLabelItems.length) {
            focusedLabelItemKey = null;
            return;
        }
        if (focusedLabelItemKey && getVisibleLabelItemIndex(focusedLabelItemKey) !== -1) return;
        if (highlightedLabelPosKey) {
            const highlightedKey = makeTreeItemKey('leaf', '', '', highlightedLabelPosKey);
            if (getVisibleLabelItemIndex(highlightedKey) !== -1) {
                focusedLabelItemKey = highlightedKey;
                return;
            }
        }
        if (currentPosKey && positionLabels.byPosKey[currentPosKey]) {
            const currentKey = makeTreeItemKey('leaf', '', '', currentPosKey);
            if (getVisibleLabelItemIndex(currentKey) !== -1) {
                focusedLabelItemKey = currentKey;
                return;
            }
        }
        focusedLabelItemKey = visiblePositionLabelItems[0].key;

    function getLabelEntriesForGroup(k1) {

        return Object.entries(positionLabels.byPosKey).filter(([, entry]) => entry.k1 === k1 && entry.k2 === k2);
