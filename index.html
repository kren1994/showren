<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>連珠 検討用ボード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f4f9; margin: 0; padding: 10px; overscroll-behavior-y: none;
            display: flex; justify-content: center; touch-action: manipulation;
        }
        .container {
            display: flex; gap: 20px; background: #fff; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-wrap: wrap; max-width: 100%; box-sizing: border-box;
        }
        .left-pane, .right-pane { flex: 1 1 100%; max-width: 650px; display: flex; flex-direction: column; gap: 10px; margin: 0 auto; }
        .board-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .canvas-stack { position: relative; display: inline-block; }
        #bgCanvas {
            background-color: #e3c482; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            display: block; max-width: 100%; height: auto !important;
        }
        #boardCanvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            cursor: pointer; touch-action: none; border-radius: 4px;
        }
        .board-controls { display: grid; grid-template-columns: 1fr auto 1fr; gap: 5px; width: 100%; box-sizing: border-box; max-width: 620px; margin: 0 auto; }
        .ctrl-left { display: flex; gap: 5px; }
        .ctrl-center { display: flex; gap: 5px; }
        .ctrl-right { display: flex; gap: 5px; justify-content: flex-end; }
        .ctrl-right button { min-width: 4em; }
        .board-controls button, .label-leaf-delete, .label-form-btn {
            padding: 12px 14px; border: 1px solid #ccc; background: #f9f9f9;
            border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; touch-action: manipulation;
            white-space: nowrap;
        }
        .board-controls button:hover, .label-leaf-delete:hover, .label-form-btn:hover {
            background: #e9e9e9;
        }
        textarea {
            width: 100%; flex-grow: 1; min-height: 150px; resize: none; overflow-y: auto; touch-action: pan-y; padding: 10px; font-size: 16px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none; background-color: #fff; color: #333;
        }
        .hidden-hint { color: transparent !important; caret-color: transparent !important; }
        .hidden-hint::placeholder { color: transparent !important; }
        .guide { font-size: 13px; color: #666; line-height: 1.5; background: #f9f9fb; padding: 10px; border-radius: 4px; border: 1px solid #eee; }
        .side-tabs {
            display: inline-flex; gap: 2px; align-self: flex-start;
            padding: 2px; border-radius: 999px; background: #f2f4f7; border: 1px solid #e3e7ed;
        }
        .tab-btn {
            appearance: none; border: 0; background: transparent; color: #667085;
            border-radius: 999px; padding: 5px 11px; font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
            cursor: pointer;
        }
        .tab-btn:hover { color: #344054; background: rgba(255, 255, 255, 0.55); }
        .tab-btn.active { background: #fff; color: #101828; box-shadow: 0 1px 2px rgba(16, 24, 40, 0.08); }
        .tab-panel { display: none; flex: 1 1 0; min-height: 0; }
        .tab-panel.active { display: flex; flex-direction: column; }
        .comment-panel textarea { height: 100%; min-height: 0; }
        .position-labels-panel { gap: 10px; min-height: 0; }
        .label-register-panel, .label-list-panel { box-sizing: border-box; }
        .label-register-panel { padding: 0; display: flex; flex-direction: column; gap: 8px; }
        .label-list-panel { flex: 1 1 0; min-height: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
        .label-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr) minmax(72px, 0.55fr) auto; gap: 8px; align-items: center; }
        .label-field input {
            width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .label-form-actions { display: contents; }
        .label-form-btn.primary { background: #eef4ff; border-color: #bfd2fb; color: #24488f; padding: 9px 14px; }
        .label-leaf-delete { background: #fff; }
        .label-error {
            display: none; align-items: center; gap: 8px; flex-wrap: wrap;
            background: #fff2f0; border: 1px solid #f0b8b2; color: #9a3126; border-radius: 6px; padding: 8px 10px; font-size: 13px;
        }
        .label-error.active { display: flex; }
        .label-error button { padding: 7px 10px; font-size: 12px; }
        .label-tree { flex: 1 1 0; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .label-empty { color: #666; font-size: 13px; padding: 8px 4px; }
        .label-group, .label-subgroup, .label-leaf { background: transparent; }
        .label-group-header, .label-subgroup-header, .label-leaf-row {
            display: flex; align-items: center; gap: 8px; width: 100%; box-sizing: border-box; padding: 7px 2px;
        }
        .label-group-header, .label-subgroup-header {
            background: transparent; cursor: pointer; border: 0; border-bottom: 1px solid #edf0f4;
            color: #344054; justify-content: flex-start; text-align: left;
        }
        .label-group-header:hover, .label-subgroup-header:hover { color: #101828; }
        .label-toggle { width: 1.2em; text-align: center; color: #98a2b3; font-size: 11px; }
        .label-title { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
        .label-count { color: #98a2b3; font-size: 11px; font-weight: 500; }
        .label-subtree { display: flex; flex-direction: column; gap: 2px; padding: 2px 0 0 14px; }
        .label-leaf-row { border-bottom: 1px solid #f2f4f7; cursor: pointer; }
        .label-leaf-row.current { color: #184a9a; }
        .label-leaf-row.highlight { box-shadow: inset 2px 0 0 #7eb1ff; }
        .label-leaf-main { flex: 1 1 auto; display: flex; align-items: center; gap: 8px; min-width: 0; }
        .label-leaf-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; padding-left: 6px; }
        .label-leaf-delete {
            padding: 4px 0; font-size: 12px; background: transparent; border: 0; color: #667085; font-weight: 600;
        }
        .label-leaf-delete:hover { background: transparent; color: #101828; }
        .label-leaf-delete { color: #b42318; }
        @media (max-width: 599px) {
            .ctrl-center button { width: 2.9em; padding-left: 0; padding-right: 0; }
            .ctrl-right { display: grid; grid-template-columns: 1fr 1fr; }
            .ctrl-right button { min-width: 0; padding-left: 0; padding-right: 0; }
            .label-form-actions { display: block; }
            .label-grid { grid-template-columns: 1fr; }
        }
        @media (min-width: 600px) and (max-width: 1199px) {
            .ctrl-center button { padding: 12px 22px; }
        }
        @media (max-width: 1199px) {
            html, body { height: 100%; overflow: hidden; }
            body { padding: 0; }
            .container { padding: 0; border-radius: 0; box-shadow: none; gap: 5px; width: 100%; height: 100%; flex-direction: column; flex-wrap: nowrap; overflow: hidden; }
            .board-container { padding-top: 10px; }
            .left-pane { flex: 0 0 auto; }
            .right-pane { flex: 1 1 0; min-height: 0; overflow: hidden; margin: 0 auto; width: 100%; max-width: 620px; padding: 0 0 10px; box-sizing: border-box; }
            .guide { display: none; }
            textarea { height: 100%; min-height: 0; margin: 0; width: 100%; line-height: 1.45; }
        }
        @media (min-width: 1200px) {
            .container { flex-wrap: nowrap; }
            .left-pane { width: 620px; flex: 0 0 auto; }
            .right-pane { width: 416px; flex: 0 0 auto; }
            textarea { min-height: 300px; line-height: 1.45; }
            textarea:focus, .label-field input:focus {
                border-color: #7ab8f5; box-shadow: 0 0 0 3px rgba(100,170,240,0.25);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-pane">
        <div class="board-container"><div class="canvas-stack"><canvas id="bgCanvas"></canvas><canvas id="boardCanvas"></canvas></div></div>
        <div class="board-controls">
            <div class="ctrl-left">
                <button class="load-btn" onclick="openFile()" style="background:#e0f0ff; border-color:#b0d0ff; color:#0055aa;">読込</button>
                <button onclick="saveKifuWithConfirm()">S</button>
            </div>
            <div class="ctrl-center">
                <button onclick="goToPrevBranch()">&lt;&lt;</button>
                <button onclick="goBack()">&lt;</button>
                <button onclick="goNext()">&gt;</button>
                <button onclick="goToNextBranch()">&gt;&gt;</button>
            </div>
            <div class="ctrl-right">
                <button id="toggleHintsBtn" onclick="toggleHints()">A</button>
                <button id="toggleCoordsBtn" onclick="toggleCoords()">座標</button>
            </div>
            <input type="file" id="fileInput" accept=".json" style="display:none;">
        </div>
    </div>
    <div class="right-pane">
        <div class="guide">
            ・<b>Delete</b> で 1 手削除<br>
            ・<b>Ctrl+S</b> で保存 / <b>Ctrl+O</b> で読込<br>
            ・<b>Ctrl+;</b> でコメント入力切替 / <b>Ctrl+F</b> でコメント表示切替
        </div>
        <div class="side-tabs">
            <button id="commentTabBtn" class="tab-btn active" type="button" onclick="setActiveSideTab('comment')">コメント</button>
            <button id="positionLabelsTabBtn" class="tab-btn" type="button" onclick="setActiveSideTab('labels')">索引</button>
        </div>
        <div id="commentPanel" class="tab-panel comment-panel active">
            <textarea id="commentArea"></textarea>
        </div>
        <div id="positionLabelsPanel" class="tab-panel position-labels-panel">
            <div class="label-register-panel">
                <div class="label-grid">
                    <div class="label-field">
                        <input id="labelInput1" list="labelK1Options" type="text" autocomplete="off" placeholder="第1階層">
                        <datalist id="labelK1Options"></datalist>
                    </div>
                    <div class="label-field">
                        <input id="labelInput2" list="labelK2Options" type="text" autocomplete="off" placeholder="第2階層">
                        <datalist id="labelK2Options"></datalist>
                    </div>
                    <div class="label-field">
                        <input id="labelInput3" type="text" autocomplete="off" placeholder="第3階層">
                    </div>
                    <div class="label-form-actions">
                        <button type="button" class="label-form-btn primary" onclick="registerCurrentPositionLabel()">登録</button>
                    </div>
                </div>
                <div id="positionLabelError" class="label-error">
                    <span id="positionLabelErrorText"></span>
                    <button id="positionLabelErrorAction" type="button"></button>
                </div>
            </div>
            <div class="label-list-panel">
                <div id="positionLabelsTree" class="label-tree"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const BOARD_SIZE = 15;
    let CELL_SIZE = 40, MARGIN_L = 35, MARGIN_R = 25, MARGIN_T = 25, MARGIN_B = 35;
    if (window.innerWidth <= 599) {
        MARGIN_T += 5;
    }
    const LOGICAL_W = 620, LOGICAL_H = 620;
    const naturalCollator = new Intl.Collator('ja', { numeric: true, sensitivity: 'base' });

    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const commentArea = document.getElementById('commentArea');
    const commentTabBtn = document.getElementById('commentTabBtn');
    const positionLabelsTabBtn = document.getElementById('positionLabelsTabBtn');
    const commentPanel = document.getElementById('commentPanel');
    const positionLabelsPanel = document.getElementById('positionLabelsPanel');
    const labelInput1 = document.getElementById('labelInput1');
    const labelInput2 = document.getElementById('labelInput2');
    const labelInput3 = document.getElementById('labelInput3');
    const labelK1Options = document.getElementById('labelK1Options');
    const labelK2Options = document.getElementById('labelK2Options');
    const positionLabelError = document.getElementById('positionLabelError');
    const positionLabelErrorText = document.getElementById('positionLabelErrorText');
    const positionLabelErrorAction = document.getElementById('positionLabelErrorAction');
    const positionLabelsTree = document.getElementById('positionLabelsTree');

    let tree = {}, posDb = {}, positionLabels = createEmptyPositionLabels();
    let currentNodeId = 'r', nextNodeId = 1;
    let showHints = true, showCoords = true, activeSideTab = 'comment';
    let highlightedLabelPosKey = null;
    let labelErrorActionHandler = null;
    const collapsedLabelGroups = new Set();
    const collapsedLabelSubgroups = new Set();

    function createEmptyPositionLabels() {
        return { byPosKey: {}, byName: {} };
    }

    function buildLabelName(k1, k2, k3) {
        return `${k1}/${k2}/${k3}`;
    }

    function subgroupKey(k1, k2) {
        return JSON.stringify([k1, k2]);
    }

    function normalizePositionLabels(pl) {
        const normalized = createEmptyPositionLabels();
        if (!pl || typeof pl !== 'object') return normalized;

        const byPosKey = pl.byPosKey && typeof pl.byPosKey === 'object' ? pl.byPosKey : {};
        for (const [posKey, entry] of Object.entries(byPosKey)) {
            if (!entry || typeof entry !== 'object') continue;
            const k1 = typeof entry.k1 === 'string' ? entry.k1.trim() : '';
            const k2 = typeof entry.k2 === 'string' ? entry.k2.trim() : '';
            const k3 = typeof entry.k3 === 'string' ? entry.k3.trim() : '';
            const rep = typeof entry.rep === 'string' ? entry.rep : '';
            if (!k1 || !k2 || !k3 || !rep) continue;
            const nameKey = buildLabelName(k1, k2, k3);
            if (normalized.byName[nameKey]) continue;
            normalized.byPosKey[posKey] = { k1, k2, k3, rep };
            normalized.byName[nameKey] = posKey;
        }
        return normalized;
    }

    function clearPositionLabelsState() {
        positionLabels = createEmptyPositionLabels();
        highlightedLabelPosKey = null;
        collapsedLabelGroups.clear();
        collapsedLabelSubgroups.clear();
        clearPositionLabelForm();
        clearPositionLabelError();
    }

    function getLabelValues() {
        return {
            k1: labelInput1.value.trim(),
            k2: labelInput2.value.trim(),
            k3: labelInput3.value.trim(),
        };
    }

    function getCurrentPosKey() {
        return getCanonicalInfo(currentNodeId).key;
    }

    function setupCanvas() {
        bgCanvas.width = LOGICAL_W * dpr; bgCanvas.height = LOGICAL_H * dpr;
        bgCanvas.style.width = LOGICAL_W + 'px'; bgCanvas.style.height = LOGICAL_H + 'px';
        bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        canvas.width = LOGICAL_W * dpr; canvas.height = LOGICAL_H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawBoard();
    }

    function initGame() {
        tree = { 'r': { i: 'r', p: null, c: [], x: null, y: null, o: 0, m: 0 } };
        posDb = {};
        currentNodeId = 'r';
        nextNodeId = 1;
        clearPositionLabelsState();
        clearCanonicalCache();
        setupCanvas();
        updateUI();
    }

    function transform(cx, cy, i) {
        const last = BOARD_SIZE - 1;
        switch(i) {
            case 0: return [cx, cy];
            case 1: return [cy, last-cx];
            case 2: return [last-cx, last-cy];
            case 3: return [last-cy, cx];
            case 4: return [last-cx, cy];
            case 5: return [cx, last-cy];
            case 6: return [cy, cx];
            case 7: return [last-cy, last-cx];
        }
    }

    function inverseTransform(px, py, i) {
        const last = BOARD_SIZE - 1;
        switch(i) {
            case 0: return [px, py];
            case 1: return [last-py, px];
            case 2: return [last-px, last-py];
            case 3: return [py, last-px];
            case 4: return [last-px, py];
            case 5: return [px, last-py];
            case 6: return [py, px];
            case 7: return [last-py, last-px];
        }
    }

    function encodeBoard(s, color) {
        const bytes = new Uint8Array(45);
        for (let i = 0; i < 45; i++) {
            let v = 0;
            for (let j = 0; j < 5; j++) v = v * 3 + +s[i * 5 + j];
            bytes[i] = v;
        }
        return btoa(String.fromCharCode(...bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '') + color;
    }

    const canonicalCache = {};
    let cacheSize = 0;
    const MAX_CACHE = 5000;

    function clearCanonicalCache() {
        for (let key in canonicalCache) delete canonicalCache[key];
        cacheSize = 0;
    }

    function getCanonicalInfo(nodeId) {
        if (canonicalCache[nodeId]) return canonicalCache[nodeId];

        let grid = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let curr = tree[nodeId];
        while (curr && curr.i !== 'r') {
            grid[curr.x][curr.y] = curr.o;
            curr = tree[curr.p];
        }
        const nextColor = tree[nodeId].m % 2 === 0 ? 1 : 2;
        let bestS = null, best = null;
        for (let i = 0; i < 8; i++) {
            let s = '';
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const [tx, ty] = transform(x, y, i);
                    s += grid[tx][ty];
                }
            }
            if (!bestS || s < bestS) {
                bestS = s;
                best = { key: encodeBoard(s, nextColor), index: i };
            }
        }
        canonicalCache[nodeId] = best;
        cacheSize++;
        if (cacheSize > MAX_CACHE) {
            for (let key in canonicalCache) delete canonicalCache[key];
            cacheSize = 0;
        }
        return best;
    }

    function updateUI() {
        ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
        const { key, index } = getCanonicalInfo(currentNodeId);
        const data = posDb[key] || { c: '', l: {}, n: {} };
        commentArea.value = data.c || '';
        drawStonesAndHighlights(data, index);
        updatePositionLabelPanel(key);
    }

    function updatePositionLabelPanel(currentPosKey) {
        updatePositionLabelDatalists();
        renderPositionLabelsList(currentPosKey);
    }

    function updatePositionLabelDatalists() {
        const years = new Set();
        const events = new Set();
        for (const entry of Object.values(positionLabels.byPosKey)) {
            years.add(entry.k1);
            events.add(entry.k2);
        }
        labelK1Options.innerHTML = '';
        labelK2Options.innerHTML = '';
        Array.from(years).sort((a, b) => naturalCollator.compare(b, a)).forEach((value) => {
            const option = document.createElement('option');
            option.value = value;
            labelK1Options.appendChild(option);
        });
        Array.from(events).sort((a, b) => naturalCollator.compare(a, b)).forEach((value) => {
            const option = document.createElement('option');
            option.value = value;
            labelK2Options.appendChild(option);
        });
    }

    function setActiveSideTab(tab) {
        activeSideTab = tab;
        const showComment = tab === 'comment';
        commentTabBtn.classList.toggle('active', showComment);
        positionLabelsTabBtn.classList.toggle('active', !showComment);
        commentPanel.classList.toggle('active', showComment);
        positionLabelsPanel.classList.toggle('active', !showComment);
    }

    function setPositionLabelError(message, actionLabel = '', actionHandler = null) {
        positionLabelError.classList.toggle('active', Boolean(message));
        positionLabelErrorText.textContent = message || '';
        positionLabelErrorAction.style.display = actionHandler ? '' : 'none';
        positionLabelErrorAction.textContent = actionLabel;
        labelErrorActionHandler = actionHandler;
    }

    function clearPositionLabelError() {
        setPositionLabelError('');
    }

    function clearPositionLabelForm() {
        labelInput1.value = '';
        labelInput2.value = '';
        labelInput3.value = '';
        clearPositionLabelError();
    }

    function expandLabelPath(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return;
        collapsedLabelGroups.delete(entry.k1);
        collapsedLabelSubgroups.delete(subgroupKey(entry.k1, entry.k2));
    }

    function revealPositionLabel(posKey) {
        if (!positionLabels.byPosKey[posKey]) return;
        highlightedLabelPosKey = posKey;
        expandLabelPath(posKey);
        setActiveSideTab('labels');
        renderPositionLabelsList(getCurrentPosKey());
        requestAnimationFrame(() => {
            const el = positionLabelsTree.querySelector(`[data-pos-key="${CSS.escape(posKey)}"]`);
            if (el) el.scrollIntoView({ block: 'nearest' });
        });
    }

    function registerCurrentPositionLabel() {
        clearPositionLabelError();
        const { k1, k2, k3 } = getLabelValues();
        if (!k1) {
            showToast('第1階層が未入力です');
            return;
        }
        if (!k2) {
            showToast('第2階層が未入力です');
            return;
        }
        if (!k3) {
            showToast('第3階層が未入力です');
            return;
        }

        const posKey = getCurrentPosKey();
        if (positionLabels.byPosKey[posKey]) {
            const existing = positionLabels.byPosKey[posKey];
            const name = buildLabelName(existing.k1, existing.k2, existing.k3);
            clearPositionLabelError();
            showToast(`現在局面が既に登録済みです：${name}`);
            return;
        }

        const nameKey = buildLabelName(k1, k2, k3);
        if (positionLabels.byName[nameKey]) {
            clearPositionLabelError();
            showToast(`局面ラベルが既に存在します：${nameKey}`);
            return;
        }

        positionLabels.byPosKey[posKey] = { k1, k2, k3, rep: currentNodeId };
        positionLabels.byName[nameKey] = posKey;
        highlightedLabelPosKey = posKey;
        expandLabelPath(posKey);
        clearPositionLabelError();
        updateUI();
        showToast('ラベルを登録しました');
    }

    function buildFilteredPositionLabelTree() {
        const roots = {};
        for (const [posKey, entry] of Object.entries(positionLabels.byPosKey)) {
            if (!roots[entry.k1]) roots[entry.k1] = { count: 0, children: {} };
            if (!roots[entry.k1].children[entry.k2]) roots[entry.k1].children[entry.k2] = { count: 0, leaves: [] };
            roots[entry.k1].count += 1;
            roots[entry.k1].children[entry.k2].count += 1;
            roots[entry.k1].children[entry.k2].leaves.push({ posKey, entry });
        }
        return roots;
    }

    function renderPositionLabelsList(currentPosKey) {
        positionLabelsTree.innerHTML = '';
        const treeData = buildFilteredPositionLabelTree();
        const yearKeys = Object.keys(treeData).sort((a, b) => naturalCollator.compare(b, a));
        if (!yearKeys.length) {
            const empty = document.createElement('div');
            empty.className = 'label-empty';
            empty.textContent = Object.keys(positionLabels.byPosKey).length === 0 ? '局面ラベルはまだありません。' : '検索条件に一致する局面ラベルがありません。';
            positionLabelsTree.appendChild(empty);
            return;
        }

        const forceExpand = false;
        for (const year of yearKeys) {
            const group = treeData[year];
            const yearExpanded = forceExpand || !collapsedLabelGroups.has(year);
            const groupEl = document.createElement('div');
            groupEl.className = 'label-group';

            const header = document.createElement('button');
            header.type = 'button';
            header.className = 'label-group-header';
            header.addEventListener('click', () => {
                if (collapsedLabelGroups.has(year)) collapsedLabelGroups.delete(year); else collapsedLabelGroups.add(year);
                renderPositionLabelsList(getCurrentPosKey());
            });

            const toggle = document.createElement('span');
            toggle.className = 'label-toggle';
            toggle.textContent = yearExpanded ? '▼' : '▶';
            const title = document.createElement('span');
            title.className = 'label-title';
            title.textContent = year;
            const count = document.createElement('span');
            count.className = 'label-count';
            count.textContent = `${group.count}件`;
            header.append(toggle, title, count);
            groupEl.appendChild(header);

            if (yearExpanded) {
                const subtree = document.createElement('div');
                subtree.className = 'label-subtree';
                const eventKeys = Object.keys(group.children).sort((a, b) => naturalCollator.compare(a, b));
                for (const eventName of eventKeys) {
                    const subgroupData = group.children[eventName];
                    const sgKey = subgroupKey(year, eventName);
                    const subgroupExpanded = forceExpand || !collapsedLabelSubgroups.has(sgKey);
                    const subgroupEl = document.createElement('div');
                    subgroupEl.className = 'label-subgroup';

                    const subHeader = document.createElement('button');
                    subHeader.type = 'button';
                    subHeader.className = 'label-subgroup-header';
                    subHeader.addEventListener('click', () => {
                        if (collapsedLabelSubgroups.has(sgKey)) collapsedLabelSubgroups.delete(sgKey); else collapsedLabelSubgroups.add(sgKey);
                        renderPositionLabelsList(getCurrentPosKey());
                    });

                    const subToggle = document.createElement('span');
                    subToggle.className = 'label-toggle';
                    subToggle.textContent = subgroupExpanded ? '▼' : '▶';
                    const subTitle = document.createElement('span');
                    subTitle.className = 'label-title';
                    subTitle.textContent = eventName;
                    const subCount = document.createElement('span');
                    subCount.className = 'label-count';
                    subCount.textContent = `${subgroupData.count}件`;
                    subHeader.append(subToggle, subTitle, subCount);
                    subgroupEl.appendChild(subHeader);

                    if (subgroupExpanded) {
                        const leafTree = document.createElement('div');
                        leafTree.className = 'label-subtree';
                        subgroupData.leaves.sort((a, b) => naturalCollator.compare(a.entry.k3, b.entry.k3));
                        for (const { posKey, entry } of subgroupData.leaves) {
                            const leaf = document.createElement('div');
                            leaf.className = 'label-leaf';
                            const row = document.createElement('div');
                            row.className = 'label-leaf-row';
                            row.dataset.posKey = posKey;
                            row.addEventListener('click', () => jumpToPositionLabel(posKey));
                            if (posKey === currentPosKey) row.classList.add('current');
                            if (posKey === highlightedLabelPosKey) row.classList.add('highlight');

                            const main = document.createElement('div');
                            main.className = 'label-leaf-main';

                            const name = document.createElement('span');
                            name.className = 'label-leaf-name';
                            name.textContent = entry.k3;
                            main.appendChild(name);

                            const delBtn = document.createElement('button');
                            delBtn.type = 'button';
                            delBtn.className = 'label-leaf-delete';
                            delBtn.textContent = '削除';
                            delBtn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                confirmDeletePositionLabel(posKey);
                            });

                            row.append(main, delBtn);
                            leaf.appendChild(row);
                            leafTree.appendChild(leaf);
                        }
                        subgroupEl.appendChild(leafTree);
                    }
                    subtree.appendChild(subgroupEl);
                }
                groupEl.appendChild(subtree);
            }
            positionLabelsTree.appendChild(groupEl);
        }
    }

    function confirmDeletePositionLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return;
        const nameKey = buildLabelName(entry.k1, entry.k2, entry.k3);
        if (!confirm(`ラベル「${nameKey}」を削除します。よろしいですか？`)) return;
        deletePositionLabel(posKey);
        updateUI();
        showToast('ラベルを削除しました');
    }

    function deletePositionLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return false;
        const nameKey = buildLabelName(entry.k1, entry.k2, entry.k3);
        delete positionLabels.byPosKey[posKey];
        delete positionLabels.byName[nameKey];
        if (highlightedLabelPosKey === posKey) highlightedLabelPosKey = null;
        clearPositionLabelError();
        return true;
    }

    function deletePositionLabelsByPosKeys(posKeys) {
        let count = 0;
        for (const posKey of posKeys) {
            if (deletePositionLabel(posKey)) count++;
        }
        return count;
    }

    function findNodeIdByPosKey(targetPosKey) {
        for (const nodeId of Object.keys(tree)) {
            if (getCanonicalInfo(nodeId).key === targetPosKey) return nodeId;
        }
        return null;
    }

    function jumpToPositionLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return;
        let targetNodeId = tree[entry.rep] ? entry.rep : findNodeIdByPosKey(posKey);
        if (!targetNodeId) {
            alert('代表手順が存在しません');
            return;
        }
        currentNodeId = targetNodeId;
        highlightedLabelPosKey = posKey;
        updateUI();
    }

    function drawBoard() {
        bgCtx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
        bgCtx.beginPath(); bgCtx.strokeStyle = '#000'; bgCtx.lineWidth = 1;
        for (let i = 0; i < BOARD_SIZE; i++) {
            bgCtx.moveTo(MARGIN_L + i * CELL_SIZE, MARGIN_T); bgCtx.lineTo(MARGIN_L + i * CELL_SIZE, MARGIN_T + (BOARD_SIZE-1)*CELL_SIZE);
            bgCtx.moveTo(MARGIN_L, MARGIN_T + i * CELL_SIZE); bgCtx.lineTo(MARGIN_L + (BOARD_SIZE-1)*CELL_SIZE, MARGIN_T + i * CELL_SIZE);
        }
        bgCtx.stroke();
        const stars = [[3,3], [11,3], [7,7], [3,11], [11,11]];
        bgCtx.fillStyle = '#000';
        for (let [x, y] of stars) { bgCtx.beginPath(); bgCtx.arc(MARGIN_L + x * CELL_SIZE, MARGIN_T + y * CELL_SIZE, 3, 0, Math.PI * 2); bgCtx.fill(); }
        if (showCoords) {
            bgCtx.fillStyle = '#333'; bgCtx.font = '14px Arial'; bgCtx.textAlign = 'center'; bgCtx.textBaseline = 'middle';
            for (let i = 0; i < BOARD_SIZE; i++) {
                bgCtx.fillText(String.fromCharCode(65 + i), MARGIN_L + i * CELL_SIZE, LOGICAL_H - 15);
                bgCtx.fillText((BOARD_SIZE - i).toString(), 15, MARGIN_T + i * CELL_SIZE);
            }
        }
    }

    function drawStonesAndHighlights(data, bestI) {
        let path = []; let curr = tree[currentNodeId];
        while (curr && curr.i !== 'r') { path.unshift(curr); curr = tree[curr.p]; }
        for (let node of path) {
            let sx = MARGIN_L + node.x * CELL_SIZE, sy = MARGIN_T + node.y * CELL_SIZE;
            ctx.beginPath(); ctx.arc(sx, sy, CELL_SIZE * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = node.o === 1 ? '#000' : '#fff'; ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = '#333'; ctx.stroke();
            ctx.fillStyle = node.o === 1 ? '#fff' : '#000';
            ctx.font = `bold ${Math.floor(CELL_SIZE*0.35)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(node.m.toString(), sx, sy);
        }

        if (showHints) {
            if (data.n) {
                for (let key in data.n) {
                    let [cx, cy] = key.split(',').map(Number);
                    let [px, py] = transform(cx, cy, bestI);
                    if (data.l && data.l[`${cx},${cy}`]) continue;
                    ctx.beginPath(); ctx.fillStyle = 'rgba(128, 128, 128, 0.8)';
                    ctx.arc(MARGIN_L + px * CELL_SIZE, MARGIN_T + py * CELL_SIZE, 5, 0, Math.PI * 2); ctx.fill();
                }
            }
            if (data.l) {
                for (let key in data.l) {
                    let [cx, cy] = key.split(',').map(Number);
                    let [px, py] = transform(cx, cy, bestI);
                    let sx = MARGIN_L + px * CELL_SIZE, sy = MARGIN_T + py * CELL_SIZE;
                    ctx.font = `bold ${Math.floor(CELL_SIZE*0.48)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)'; ctx.lineWidth = 3.5; ctx.strokeText(data.l[key], sx, sy);
                    ctx.fillStyle = '#555'; ctx.fillText(data.l[key], sx, sy);
                }
            }
        }
    }

    function isTouchMain() {
        return window.matchMedia('(pointer: coarse)').matches;
    }

    function updateCommentEditable() {
        commentArea.readOnly = isTouchMain() || !showHints;
        commentArea.placeholder = isTouchMain() ? '' : '...';
    }

    updateCommentEditable();
    window.matchMedia('(pointer: coarse)').addEventListener('change', updateCommentEditable);

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = LOGICAL_W / rect.width, scaleY = LOGICAL_H / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX, mouseY = (e.clientY - rect.top) * scaleY;
        const px = Math.round((mouseX - MARGIN_L) / CELL_SIZE), py = Math.round((mouseY - MARGIN_T) / CELL_SIZE);
        if (px < 0 || px >= BOARD_SIZE || py < 0 || py >= BOARD_SIZE) return;

        const { key, index } = getCanonicalInfo(currentNodeId);
        const [cx, cy] = inverseTransform(px, py, index);

        if (e.ctrlKey) {
            if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
            if (!posDb[key].l) posDb[key].l = {};
            let currentText = posDb[key].l[`${cx},${cy}`] || '';
            let newText = prompt('交点テキストを入力:', currentText);
            if (newText !== null) {
                if (newText === '') delete posDb[key].l[`${cx},${cy}`]; else posDb[key].l[`${cx},${cy}`] = newText;
                updateUI();
            }
            return;
        }

        let node = tree[currentNodeId];
        for (let cid of node.c) {
            if (tree[cid].x === px && tree[cid].y === py) {
                if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
                if (!posDb[key].n) posDb[key].n = {};
                posDb[key].n[`${cx},${cy}`] = 1;
                node.l = cid;
                currentNodeId = cid;
                updateUI();
                return;
            }
        }
        let temp = currentNodeId;
        while (temp !== 'r') { if (tree[temp].x === px && tree[temp].y === py) return; temp = tree[temp].p; }

        if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
        if (!posDb[key].n) posDb[key].n = {};
        posDb[key].n[`${cx},${cy}`] = 1;

        let nid = '' + nextNodeId++;
        tree[nid] = { i: nid, p: currentNodeId, c: [], x: px, y: py, o: node.m % 2 === 0 ? 1 : 2, m: node.m + 1 };
        node.c.push(nid); node.l = nid; currentNodeId = nid; updateUI();
    });

    commentArea.addEventListener('input', (e) => {
        const { key } = getCanonicalInfo(currentNodeId);
        if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
        posDb[key].c = e.target.value;
    });

    commentArea.addEventListener('keydown', (e) => {
        if (document.activeElement !== commentArea) return;
        if (!e.ctrlKey) return;

        const start = commentArea.selectionStart;
        const end = commentArea.selectionEnd;
        const value = commentArea.value;

        if (e.key === 'j') {
            e.preventDefault();
            insertText('\n');
        } else if (e.key === 'h') {
            e.preventDefault();
            if (start === end && start > 0) {
                commentArea.value = value.slice(0, start - 1) + value.slice(end);
                setCursor(start - 1);
            } else {
                commentArea.value = value.slice(0, start) + value.slice(end);
                setCursor(start);
            }
        }

        function insertText(text) {
            commentArea.value = value.slice(0, start) + text + value.slice(end);
            setCursor(start + text.length);
        }

        function setCursor(pos) {
            commentArea.selectionStart = commentArea.selectionEnd = pos;
            commentArea.dispatchEvent(new Event('input'));
        }
    });

    positionLabelErrorAction.addEventListener('click', () => {
        if (labelErrorActionHandler) labelErrorActionHandler();
    });
    function toggleHints() {
        showHints = !showHints;
        document.getElementById('toggleHintsBtn').style.background = showHints ? '#f9f9f9' : '#ddd';
        commentArea.classList.toggle('hidden-hint', !showHints);
        updateUI();
        updateCommentEditable();
    }

    function toggleCoords() {
        showCoords = !showCoords;
        document.getElementById('toggleCoordsBtn').style.background = showCoords ? '#f9f9f9' : '#ddd';
        if (showCoords) {
            CELL_SIZE = 40; MARGIN_L = 35; MARGIN_R = 25; MARGIN_T = 25; MARGIN_B = 35;
        } else {
            CELL_SIZE = (620-40)/14; MARGIN_L = MARGIN_R = MARGIN_T = MARGIN_B = 20;
        }
        drawBoard();
        updateUI();
    }

    function goBack() { if (tree[currentNodeId].p) { currentNodeId = tree[currentNodeId].p; updateUI(); } }
    function goNext() { let node = tree[currentNodeId], target = node.l || (node.c.length > 0 ? node.c[0] : null); if (target) { currentNodeId = target; updateUI(); } }
    function goToPrevBranch() { let curr = tree[currentNodeId]; while (curr.p) { curr = tree[curr.p]; if (curr.c.length > 1 || curr.i === 'r') { currentNodeId = curr.i; updateUI(); return; } } }
    function goToNextBranch() {
        let curr = tree[currentNodeId], target = curr.l || (curr.c.length > 0 ? curr.c[0] : null);
        while (target) { curr = tree[target]; if (curr.c.length > 1 || curr.c.length === 0) { currentNodeId = curr.i; updateUI(); return; } target = curr.l || (curr.c.length > 0 ? curr.c[0] : null); }
    }

    function deleteCurrentNode() {
        if (currentNodeId === 'r') return;
        if (!confirm('現在の手以降の変化を削除します。関連する局面ラベルも削除されます。よろしいですか？')) return;
        const tid = currentNodeId;
        const nodeToRemove = tree[tid];
        const pid = nodeToRemove.p;

        const { key: pKey, index: pIndex } = getCanonicalInfo(pid);
        const [cx, cy] = inverseTransform(nodeToRemove.x, nodeToRemove.y, pIndex);
        if (posDb[pKey] && posDb[pKey].n) {
            delete posDb[pKey].n[`${cx},${cy}`];
        }

        const deletedPosKeys = new Set();
        const del = (id) => {
            const { key: dKey } = getCanonicalInfo(id);
            deletedPosKeys.add(dKey);
            delete posDb[dKey];
            tree[id].c.forEach(del);
            delete tree[id];
        };
        del(tid);

        const deletedLabelCount = deletePositionLabelsByPosKeys(deletedPosKeys);
        tree[pid].c = tree[pid].c.filter((id) => id !== tid);
        currentNodeId = pid;
        updateUI();
        if (deletedLabelCount > 0) showToast(`局面ラベルを ${deletedLabelCount} 件削除しました`);
    }

    document.addEventListener('keydown', (e) => {
        if (document.activeElement === commentArea) {
            if (e.ctrlKey && e.key === ';') { e.preventDefault(); commentArea.blur(); }
            return;
        }
        if (e.ctrlKey || e.metaKey) {
            const key = e.key.toLowerCase();
            if (e.key === ';') { e.preventDefault(); commentArea.focus(); }
            else if (key === 's') { e.preventDefault(); saveKifu(); }
            else if (key === 'o') { e.preventDefault(); openFile(); }
            else if (key === 'f') { e.preventDefault(); toggleHints(); }
            return;
        }
        switch (e.key) {
            case 'h': e.preventDefault(); goToPrevBranch(); break;
            case 'j': e.preventDefault(); goBack(); break;
            case 'k': e.preventDefault(); goNext(); break;
            case 'l': e.preventDefault(); goToNextBranch(); break;
            case 'ArrowLeft': goBack(); break;
            case 'ArrowRight': goNext(); break;
            case 'ArrowUp': goToPrevBranch(); break;
            case 'ArrowDown': goToNextBranch(); break;
            case 'Delete': deleteCurrentNode(); break;
        }
    });

    let fileHandle = null;

    async function openFile() {
        if (window.showOpenFilePicker) {
            try {
                const [handle] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
                fileHandle = handle;
                const file = await handle.getFile();
                loadFromText(await file.text());
            } catch (e) {
                if (e.name !== 'AbortError') alert('読込失敗');
            }
        } else {
            document.getElementById('fileInput').click();
        }
    }

    function loadFromText(text) {
        try {
            const data = JSON.parse(text);
            tree = data.t;
            posDb = data.p || {};
            currentNodeId = data.c;
            nextNodeId = data.n;
            positionLabels = normalizePositionLabels(data.pl);
            highlightedLabelPosKey = null;
            clearPositionLabelError();
            clearCanonicalCache();
            updateUI();
        } catch (err) {
            alert('読込失敗');
        }
    }

    function showToast(msg) {
        const el = document.createElement('div');
        el.textContent = msg;
        el.style = `
            position:fixed; bottom:20px; right:20px;
            background:#333; color:#fff; padding:8px 12px;
            border-radius:6px; opacity:0.9;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1500);
    }

    function buildSaveData() {
        return { t: tree, p: posDb, c: currentNodeId, n: nextNodeId, pl: positionLabels };
    }

    function downloadJson() {
        const json = JSON.stringify(buildSaveData());
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
        a.download = `renju_${Date.now()}.json`;
        a.click();
        showToast('保存しました');
    }

    async function saveKifu() {
        const json = JSON.stringify(buildSaveData());
        if (!window.showSaveFilePicker) { downloadJson(); return; }

        try {
            if (!fileHandle) {
                fileHandle = await window.showSaveFilePicker({
                    suggestedName: `renju_${Date.now()}.json`,
                    types: [{ description: 'JSONファイル', accept: { 'application/json': ['.json'] } }]
                });
            }
            const writable = await fileHandle.createWritable();
            await writable.write(json);
            await writable.close();
            showToast('保存しました');
        } catch (e) {
            // キャンセル or エラー → 何もしない
        }
    }

    async function saveKifuWithConfirm() {
        if (fileHandle && !await confirm('上書き保存しますか？')) return;
        await saveKifu();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        fileHandle = null;
        const reader = new FileReader();
        reader.onload = (ev) => loadFromText(ev.target.result);
        reader.readAsText(file);
        e.target.value = '';
    });

    canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); goBack(); });
    if (isTouchMain()) document.addEventListener('touchmove', (e) => { if (!commentArea.contains(e.target)) e.preventDefault(); }, { passive: false });

    document.addEventListener('dragover', (e) => {
        e.preventDefault();
    });

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file) return;
        if (!file.name.endsWith('.json')) {
            alert('JSONファイルをドロップしてください');
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => loadFromText(ev.target.result);
        reader.readAsText(file);
        fileHandle = null;
    });

    window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = '';
    });

    commentArea.addEventListener('focus', (e) => {
        if (isTouchMain()) e.target.blur();
    });

    initGame();
</script>
</body>
</html>
