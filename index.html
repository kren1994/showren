<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>連珠 検討用ボード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f4f9; margin: 0; padding: 10px;
            display: flex; justify-content: center; touch-action: manipulation; 
        }
        .container {
            display: flex; gap: 20px; background: #fff; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-wrap: wrap; max-width: 100%; box-sizing: border-box;
        }
        .left-pane, .right-pane { flex: 1 1 100%; max-width: 650px; display: flex; flex-direction: column; gap: 10px; margin: 0 auto; }
        .board-container { position: relative; width: 100%; display: flex; justify-content: center; }
        canvas {
            background-color: #e3c482; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            cursor: pointer; display: block; margin: 0 auto; touch-action: none; 
            max-width: 100%; height: auto !important;
        }
        .board-controls { display: flex; gap: 5px; width: 100%; box-sizing: border-box; }
        .board-controls button {
            flex: 1; padding: 12px 0; border: 1px solid #ccc; background: #f9f9f9;
            border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; touch-action: manipulation; 
        }
        .board-controls button:hover { background: #e9e9e9; }
        textarea {
            width: 100%; flex-grow: 1; min-height: 150px; resize: vertical; padding: 10px; font-size: 16px; 
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none; background-color: #fff; color: #333;
        }
        .hidden-hint { color: transparent !important; caret-color: transparent !important; }
        .hidden-hint::placeholder { color: transparent !important; }
        .guide { font-size: 13px; color: #666; line-height: 1.5; background: #f9f9fb; padding: 10px; border-radius: 4px; border: 1px solid #eee; }
        @media (max-width: 1199px) {
            body { padding: 0; } .container { padding: 0; border-radius: 0; box-shadow: none; gap: 5px; width: 100%; }
            .guide { display: none; } textarea { min-height: 210px; margin: 0 5px 10px 5px; width: calc(100% - 10px); line-height: 1.45; }
        }
        @media (min-width: 1200px) {
            .container { flex-wrap: nowrap; } .left-pane { width: 610px; flex: 0 0 auto; } .right-pane { width: 416px; flex: 0 0 auto; } 
            textarea { min-height: 300px; line-height: 1.45; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-pane">
        <div class="board-container"><canvas id="boardCanvas"></canvas></div>
        <div class="board-controls">
            <button class="load-btn" onclick="document.getElementById('fileInput').click()" style="background:#e0f0ff; border-color:#b0d0ff; color:#0055aa;">読込</button>
            <div style="flex: 0.5;"></div> 
            <button onclick="goToPrevBranch()">&lt;&lt;</button>
            <button onclick="goBack()">&lt;</button>
            <button onclick="goNext()">&gt;</button>
            <button onclick="goToNextBranch()">&gt;&gt;</button>
            <button id="toggleHintsBtn" onclick="toggleHints()">A</button>
            <button id="toggleCoordsBtn" onclick="toggleCoords()">座標</button>
            <input type="file" id="fileInput" accept=".json" style="display:none;">
        </div>
    </div>
    <div class="right-pane">
        <div class="guide">
            ・<b>Delete</b> で最新手を削除 / <b>Ctrl+Z</b> でUndo<br>
            ・<b>Ctrl+S</b> で保存 / <b>Ctrl+O</b> で読込<br>
            ・<b>Ctrl+[</b> でコメント入力切替
        </div>
        <textarea id="commentArea" placeholder="ここに局面のコメントを入力..."></textarea>
    </div>
</div>

<script>
    const BOARD_SIZE = 15;
    let CELL_SIZE = 40, MARGIN_L = 35, MARGIN_R = 15, MARGIN_T = 25, MARGIN_B = 35; 
    const LOGICAL_W = 610, LOGICAL_H = 620; 

    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const commentArea = document.getElementById('commentArea');

    let tree = {}, posDb = {}; 
    let currentNodeId = 'root', nextNodeId = 1, undoStack = []; 
    let showHints = true, showCoords = true;

    function setupCanvas() {
        canvas.width = LOGICAL_W * dpr; canvas.height = LOGICAL_H * dpr;
        canvas.style.width = LOGICAL_W + 'px'; canvas.style.height = LOGICAL_H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function initGame() {
        tree = { 'root': { id: 'root', parent: null, children: [], x: null, y: null, color: 0, moveNumber: 0 } };
        posDb = {}; currentNodeId = 'root'; nextNodeId = 1; undoStack = [];
        setupCanvas(); updateUI();
    }

    function transform(x, y, i) {
        const last = BOARD_SIZE - 1;
        switch(i) {
            case 0: return [x, y]; case 1: return [y, last-x]; case 2: return [last-x, last-y]; case 3: return [last-y, x];
            case 4: return [last-x, y]; case 5: return [x, last-y]; case 6: return [y, x]; case 7: return [last-y, last-x];
        }
    }

    function getInverseTransform(i) { return [0, 3, 2, 1, 4, 5, 6, 7][i]; }

    function getCanonicalInfo(nodeId) {
        let grid = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let curr = tree[nodeId];
        while (curr && curr.id !== 'root') { grid[curr.x][curr.y] = curr.color; curr = tree[curr.parent]; }
        const nextColor = tree[nodeId].moveNumber % 2 === 0 ? 1 : 2;
        let variants = [];
        for (let i = 0; i < 8; i++) {
            let s = "";
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const [tx, ty] = transform(x, y, i); s += grid[tx][ty];
                }
            }
            variants.push({ key: s + "_" + nextColor, index: i });
        }
        variants.sort((a, b) => a.key.localeCompare(b.key));
        return variants[0];
    }

    function updateUI() {
        drawBoard();
        const { key, index } = getCanonicalInfo(currentNodeId);
        const data = posDb[key] || { comment: "", labels: {}, nextMoves: {} };
        commentArea.value = data.comment || "";
        drawStonesAndHighlights(data, index);
    }

    function drawBoard() {
        ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
        ctx.fillStyle = '#e3c482'; ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
        ctx.beginPath(); ctx.strokeStyle = '#000'; ctx.lineWidth = 1; 
        for (let i = 0; i < BOARD_SIZE; i++) {
            ctx.moveTo(MARGIN_L + i * CELL_SIZE, MARGIN_T); ctx.lineTo(MARGIN_L + i * CELL_SIZE, MARGIN_T + (BOARD_SIZE-1)*CELL_SIZE);
            ctx.moveTo(MARGIN_L, MARGIN_T + i * CELL_SIZE); ctx.lineTo(MARGIN_L + (BOARD_SIZE-1)*CELL_SIZE, MARGIN_T + i * CELL_SIZE);
        }
        ctx.stroke();
        const stars = [[3,3], [11,3], [7,7], [3,11], [11,11]];
        ctx.fillStyle = '#000';
        for (let [x, y] of stars) { ctx.beginPath(); ctx.arc(MARGIN_L + x * CELL_SIZE, MARGIN_T + y * CELL_SIZE, 3, 0, Math.PI * 2); ctx.fill(); }
        if (showCoords) {
            ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let i = 0; i < BOARD_SIZE; i++) {
                ctx.fillText(String.fromCharCode(65 + i), MARGIN_L + i * CELL_SIZE, LOGICAL_H - 15);
                ctx.fillText((BOARD_SIZE - i).toString(), 15, MARGIN_T + i * CELL_SIZE);
            }
        }
    }

    function drawStonesAndHighlights(data, bestI) {
        let path = []; let curr = tree[currentNodeId];
        while (curr && curr.id !== 'root') { path.unshift(curr); curr = tree[curr.parent]; }
        for (let node of path) {
            let sx = MARGIN_L + node.x * CELL_SIZE, sy = MARGIN_T + node.y * CELL_SIZE;
            ctx.beginPath(); ctx.arc(sx, sy, CELL_SIZE * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = node.color === 1 ? '#000' : '#fff'; ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = '#333'; ctx.stroke();
            ctx.fillStyle = node.color === 1 ? '#fff' : '#000';
            ctx.font = `bold ${Math.floor(CELL_SIZE*0.35)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(node.moveNumber.toString(), sx, sy);
        }

        if (showHints) {
            if (data.nextMoves) {
                for (let key in data.nextMoves) {
                    let [cx, cy] = key.split(',').map(Number);
                    let [rx, ry] = transform(cx, cy, bestI);
                    if (data.labels && data.labels[`${cx},${cy}`]) continue;
                    ctx.beginPath(); ctx.fillStyle = 'rgba(128, 128, 128, 0.6)'; 
                    ctx.arc(MARGIN_L + rx * CELL_SIZE, MARGIN_T + ry * CELL_SIZE, 5, 0, Math.PI * 2); ctx.fill();
                }
            }
            if (data.labels) {
                for (let key in data.labels) {
                    let [cx, cy] = key.split(',').map(Number);
                    let [rx, ry] = transform(cx, cy, bestI);
                    let sx = MARGIN_L + rx * CELL_SIZE, sy = MARGIN_T + ry * CELL_SIZE;
                    ctx.font = `bold ${Math.floor(CELL_SIZE*0.43)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)'; ctx.lineWidth = 2.5; ctx.strokeText(data.labels[key], sx, sy);
                    ctx.fillStyle = '#555'; ctx.fillText(data.labels[key], sx, sy);
                }
            }
        }
    }

    function pushUndo() { undoStack.push(JSON.stringify({ tree, posDb, currentNodeId, nextNodeId })); if (undoStack.length > 50) undoStack.shift(); }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = LOGICAL_W / rect.width, scaleY = LOGICAL_H / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX, mouseY = (e.clientY - rect.top) * scaleY;
        const x = Math.round((mouseX - MARGIN_L) / CELL_SIZE), y = Math.round((mouseY - MARGIN_T) / CELL_SIZE);
        if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return;

        const { key, index } = getCanonicalInfo(currentNodeId);
        const invI = getInverseTransform(index);

        if (e.ctrlKey) {
            if (!posDb[key]) posDb[key] = { comment: "", labels: {}, nextMoves: {} };
            const [cx, cy] = transform(x, y, invI);
            let currentText = posDb[key].labels[`${cx},${cy}`] || "";
            let newText = prompt("交点テキストを入力:", currentText);
            if (newText !== null) {
                pushUndo(); if (newText === "") delete posDb[key].labels[`${cx},${cy}`]; else posDb[key].labels[`${cx},${cy}`] = newText;
                updateUI();
            }
            return;
        }

        let node = tree[currentNodeId];
        for (let cid of node.children) { if (tree[cid].x === x && tree[cid].y === y) { node.lastSelectedChild = cid; currentNodeId = cid; updateUI(); return; } }
        let temp = currentNodeId;
        while (temp !== 'root') { if (tree[temp].x === x && tree[temp].y === y) return; temp = tree[temp].parent; }
        
        pushUndo();
        if (!posDb[key]) posDb[key] = { comment: "", labels: {}, nextMoves: {} };
        if (!posDb[key].nextMoves) posDb[key].nextMoves = {};
        const [cx, cy] = transform(x, y, invI);
        posDb[key].nextMoves[`${cx},${cy}`] = true;

        let nid = 'node_' + (nextNodeId++);
        tree[nid] = { id: nid, parent: currentNodeId, children: [], x, y, color: node.moveNumber % 2 === 0 ? 1 : 2, moveNumber: node.moveNumber + 1 };
        node.children.push(nid); node.lastSelectedChild = nid; currentNodeId = nid; updateUI();
    });

    commentArea.addEventListener('input', (e) => {
        const { key } = getCanonicalInfo(currentNodeId);
        if (!posDb[key]) posDb[key] = { comment: "", labels: {}, nextMoves: {} };
        posDb[key].comment = e.target.value;
    });

    function toggleHints() { showHints = !showHints; document.getElementById('toggleHintsBtn').style.background = showHints ? "#f9f9f9" : "#ddd"; commentArea.classList.toggle('hidden-hint', !showHints); commentArea.readOnly = !showHints; updateUI(); }
    function toggleCoords() {
        showCoords = !showCoords; document.getElementById('toggleCoordsBtn').style.background = showCoords ? "#f9f9f9" : "#ddd";
        if (showCoords) { CELL_SIZE = 40; MARGIN_L = 35; MARGIN_R = 15; MARGIN_T = 25; MARGIN_B = 35; }
        else { CELL_SIZE = (610-40)/14; MARGIN_L = MARGIN_R = MARGIN_T = MARGIN_B = 20; }
        updateUI();
    }
    function goBack() { if (tree[currentNodeId].parent) { currentNodeId = tree[currentNodeId].parent; updateUI(); } }
    function goNext() { let n = tree[currentNodeId], t = n.lastSelectedChild || (n.children.length > 0 ? n.children[0] : null); if (t) { currentNodeId = t; updateUI(); } }
    function goToPrevBranch() { let c = tree[currentNodeId]; while (c.parent) { c = tree[c.parent]; if (c.children.length > 1 || c.id === 'root') { currentNodeId = c.id; updateUI(); return; } } }
    function goToNextBranch() {
        let c = tree[currentNodeId], t = c.lastSelectedChild || (c.children.length > 0 ? c.children[0] : null);
        while (t) { c = tree[t]; if (c.children.length > 1 || c.children.length === 0) { currentNodeId = c.id; updateUI(); return; } t = c.lastSelectedChild || (c.children.length > 0 ? c.children[0] : null); }
    }
    function undo() { if (undoStack.length === 0) return; const s = JSON.parse(undoStack.pop()); tree = s.tree; posDb = s.posDb; currentNodeId = s.currentNodeId; nextNodeId = s.nextNodeId; updateUI(); }
    
    function deleteCurrentNode() {
        if (currentNodeId === 'root') return;
        pushUndo();
        const tid = currentNodeId;
        const nodeToRemove = tree[tid];
        const pid = nodeToRemove.parent;

        // 親局面のposDbからこの遷移を削除
        const { key, index } = getCanonicalInfo(pid);
        const invI = getInverseTransform(index);
        const [cx, cy] = transform(nodeToRemove.x, nodeToRemove.y, invI);
        if (posDb[key]) {
            if (posDb[key].nextMoves) delete posDb[key].nextMoves[`${cx},${cy}`];
            if (posDb[key].labels) delete posDb[key].labels[`${cx},${cy}`];
        }

        // ツリーとposDbデータを再帰的に削除
        tree[pid].children = tree[pid].children.filter(id => id !== tid);
        const del = (id) => {
            const { key: dKey } = getCanonicalInfo(id);
            delete posDb[dKey]; // この局面のコメント・ラベル・次の手を全削除
            tree[id].children.forEach(del);
            delete tree[id];
        };
        del(tid);

        currentNodeId = pid;
        updateUI();
    }

    document.addEventListener('keydown', (e) => {
        if (document.activeElement === commentArea) { if (e.ctrlKey && e.key === '[') { e.preventDefault(); commentArea.blur(); } return; }
        if (e.ctrlKey || e.metaKey) {
            const k = e.key.toLowerCase();
            if (e.key === '[') { e.preventDefault(); commentArea.focus(); }
            else if (k === 'z') { e.preventDefault(); undo(); } else if (k === 's') { e.preventDefault(); saveKifu(); }
            else if (k === 'o') { e.preventDefault(); document.getElementById('fileInput').click(); } return;
        }
        switch(e.key) {
            case 'h': e.preventDefault(); goToPrevBranch(); break; 
            case 'j': e.preventDefault(); goBack(); break;
            case 'k': e.preventDefault(); goNext(); break; 
            case 'l': e.preventDefault(); goToNextBranch(); break;
            case 'ArrowLeft': goBack(); break; case 'ArrowRight': goNext(); break;
            case 'ArrowUp': goToPrevBranch(); break; case 'ArrowDown': goToNextBranch(); break;
            case 'Delete': deleteCurrentNode(); break;
        }
    });
    function saveKifu() {
        const data = { tree, posDb, currentNodeId, nextNodeId };
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
        a.download = `renju_${new Date().getTime()}.json`; a.click();
    }
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader(); reader.onload = (e) => {
            try {
                const d = JSON.parse(e.target.result);
                tree = d.tree; posDb = d.posDb || {}; currentNodeId = d.currentNodeId; nextNodeId = d.nextNodeId; undoStack = []; updateUI();
            } catch(err) { alert("読込失敗"); }
        }; reader.readAsText(file); e.target.value = '';
    });
    canvas.addEventListener('contextmenu', e => { e.preventDefault(); goBack(); });
    initGame();
</script>
</body>
</html>
