    function renameLabelEntries(entries, getNextValues, successMessage) {
        if (!entries.length) return false;

        const plannedEntries = entries.map(([posKey, entry]) => ({ posKey, entry, next: getNextValues(entry) }));
        for (const { posKey, next } of plannedEntries) {
            const nextName = buildLabelName(next.k1, next.k2, next.k3);
            const conflictPosKey = positionLabels.byName[nextName];
            if (conflictPosKey && conflictPosKey !== posKey) {
                showToast(`局面ラベルが既に存在します：${nextName}`);
                return false;
            }
        }

        for (const { entry } of plannedEntries) {
            delete positionLabels.byName[buildLabelName(entry.k1, entry.k2, entry.k3)];
        }
        for (const { posKey, entry, next } of plannedEntries) {
            entry.k1 = next.k1;
            entry.k2 = next.k2;
            entry.k3 = next.k3;
            positionLabels.byName[buildLabelName(entry.k1, entry.k2, entry.k3)] = posKey;
        }

        clearPositionLabelError();
        updateUI();
        showToast(successMessage);
        return true;
    }

    function promptRenameLabel(currentName, label) {
        const nextName = prompt(label, currentName);
        if (nextName === null) return null;
        const trimmed = nextName.trim();
        if (!trimmed) {
            showToast('空の名前にはできません');
            return null;
        }
        return trimmed;
    }

    function renameFirstLevelLabel(oldK1) {
        const nextK1 = promptRenameLabel(oldK1, '第1階層名を入力');
        if (!nextK1 || nextK1 === oldK1) return;
        const entries = getLabelEntriesForGroup(oldK1);
        const oldCollapsed = collapsedLabelGroups.has(oldK1);
        const collapsedK2Names = Array.from(new Set(
            entries
                .map(([, entry]) => entry.k2)
                .filter((k2) => collapsedLabelSubgroups.has(subgroupKey(oldK1, k2)))
        ));
        if (renameLabelEntries(entries, (entry) => ({ k1: nextK1, k2: entry.k2, k3: entry.k3 }), '第1階層名を変更しました')) {
            collapsedLabelGroups.delete(oldK1);
            if (oldCollapsed) collapsedLabelGroups.add(nextK1);
            for (const k2 of collapsedK2Names) {
                collapsedLabelSubgroups.delete(subgroupKey(oldK1, k2));
                collapsedLabelSubgroups.add(subgroupKey(nextK1, k2));
            }
            focusedLabelItemKey = makeTreeItemKey('group', nextK1);
            renderPositionLabelsList(getCurrentPosKey());
        }
    }

    function renameSecondLevelLabel(k1, oldK2) {
        const nextK2 = promptRenameLabel(oldK2, '第2階層名を入力');
        if (!nextK2 || nextK2 === oldK2) return;
        const entries = getLabelEntriesForSubgroup(k1, oldK2);
        const oldKey = subgroupKey(k1, oldK2);
        const wasCollapsed = collapsedLabelSubgroups.has(oldKey);
        if (renameLabelEntries(entries, (entry) => ({ k1: entry.k1, k2: nextK2, k3: entry.k3 }), '第2階層名を変更しました')) {
            collapsedLabelSubgroups.delete(oldKey);
            if (wasCollapsed) collapsedLabelSubgroups.add(subgroupKey(k1, nextK2));
            focusedLabelItemKey = makeTreeItemKey('subgroup', k1, nextK2);
            renderPositionLabelsList(getCurrentPosKey());
        }
    }

    function renameThirdLevelLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return;
        const nextK3 = promptRenameLabel(entry.k3, '第3階層名を入力');
        if (!nextK3 || nextK3 === entry.k3) return;
        if (renameLabelEntries([[posKey, entry]], () => ({ k1: entry.k1, k2: entry.k2, k3: nextK3 }), '第3階層名を変更しました')) {
            focusedLabelItemKey = makeTreeItemKey('leaf', '', '', posKey);
            renderPositionLabelsList(getCurrentPosKey());
        }
    }

    function confirmDeleteFirstLevelLabel(k1) {
        const posKeys = getLabelEntriesForGroup(k1).map(([posKey]) => posKey);
        if (!posKeys.length) return false;
        if (!confirm(`第1階層「${k1}」を削除します。配下の ${posKeys.length} 件も削除されます。よろしいですか？`)) return false;
        collapsedLabelGroups.delete(k1);
        for (const [, entry] of getLabelEntriesForGroup(k1)) {
            collapsedLabelSubgroups.delete(subgroupKey(k1, entry.k2));
        }
        deletePositionLabelsByPosKeys(posKeys);
        focusedLabelItemKey = null;
        updateUI();
        showToast('ラベルを削除しました');
        return true;
    }

    function confirmDeleteSecondLevelLabel(k1, k2) {
        const posKeys = getLabelEntriesForSubgroup(k1, k2).map(([posKey]) => posKey);
        if (!posKeys.length) return false;
        if (!confirm(`第2階層「${k1}/${k2}」を削除します。配下の ${posKeys.length} 件も削除されます。よろしいですか？`)) return false;
        collapsedLabelSubgroups.delete(subgroupKey(k1, k2));
        deletePositionLabelsByPosKeys(posKeys);
        focusedLabelItemKey = null;
        updateUI();
        showToast('ラベルを削除しました');
        return true;
    }

    function renderPositionLabelsList(currentPosKey) {
        positionLabelsTree.innerHTML = '';
        visiblePositionLabelItems = [];
        const treeData = buildFilteredPositionLabelTree();
        const yearKeys = Object.keys(treeData).sort((a, b) => naturalCollator.compare(b, a));
        if (!yearKeys.length) {
            const empty = document.createElement('div');
            empty.className = 'label-empty';
            empty.textContent = Object.keys(positionLabels.byPosKey).length === 0 ? '局面ラベルはまだありません。' : '検索条件に一致する局面ラベルがありません。';
            positionLabelsTree.appendChild(empty);
            focusedLabelItemKey = null;
            return;
        }

        const showEditButtons = !isTouchMain();
        const forceExpand = false;
        for (const year of yearKeys) {
            const group = treeData[year];
            const yearExpanded = forceExpand || !collapsedLabelGroups.has(year);
            const groupItemKey = makeTreeItemKey('group', year);
            visiblePositionLabelItems.push({ key: groupItemKey, type: 'group', k1: year, expanded: yearExpanded });
            const groupEl = document.createElement('div');
            groupEl.className = 'label-group';

            const header = document.createElement('div');
            header.className = 'label-group-header';
            header.dataset.itemKey = groupItemKey;
            const mainButton = document.createElement('button');
            mainButton.type = 'button';
            mainButton.className = 'label-item-main';
            mainButton.addEventListener('click', () => {
                focusedLabelItemKey = groupItemKey;
                if (collapsedLabelGroups.has(year)) collapsedLabelGroups.delete(year); else collapsedLabelGroups.add(year);
                renderPositionLabelsList(getCurrentPosKey());
            });

            const toggle = document.createElement('span');
            toggle.className = 'label-toggle';
            toggle.textContent = yearExpanded ? '▼' : '▶';
            const title = document.createElement('span');
            title.className = 'label-title';
            title.textContent = year;
            mainButton.append(toggle, title);

            const actions = document.createElement('div');
            actions.className = 'label-item-actions';
            const count = document.createElement('span');
            count.className = 'label-count';
            count.textContent = `${group.count}件`;
            actions.appendChild(count);
            if (showEditButtons) actions.appendChild(createLabelActionButton('✎', '名前を編集', () => renameFirstLevelLabel(year)));
            actions.appendChild(createLabelActionButton('−', '削除', () => confirmDeleteFirstLevelLabel(year)));
            header.append(mainButton, actions);
            if (focusedLabelItemKey === groupItemKey) header.classList.add('label-item-focused');
            header.addEventListener('click', () => {
                focusedLabelItemKey = groupItemKey;
                focusPositionLabelsTree(groupItemKey);
            });
            groupEl.appendChild(header);

            if (yearExpanded) {
                const subtree = document.createElement('div');
                subtree.className = 'label-subtree';
                const eventKeys = Object.keys(group.children).sort((a, b) => naturalCollator.compare(a, b));
                for (const eventName of eventKeys) {
                    const subgroupData = group.children[eventName];
                    const sgKey = subgroupKey(year, eventName);
                    const subgroupExpanded = forceExpand || !collapsedLabelSubgroups.has(sgKey);
                    const subgroupItemKey = makeTreeItemKey('subgroup', year, eventName);
                    visiblePositionLabelItems.push({ key: subgroupItemKey, type: 'subgroup', k1: year, k2: eventName, expanded: subgroupExpanded, parentKey: groupItemKey });
                    const subgroupEl = document.createElement('div');
                    subgroupEl.className = 'label-subgroup';

                    const subHeader = document.createElement('div');
                    subHeader.className = 'label-subgroup-header';
                    subHeader.dataset.itemKey = subgroupItemKey;
                    const subMainButton = document.createElement('button');
                    subMainButton.type = 'button';
                    subMainButton.className = 'label-item-main';
                    subMainButton.addEventListener('click', () => {
                        focusedLabelItemKey = subgroupItemKey;
                        if (collapsedLabelSubgroups.has(sgKey)) collapsedLabelSubgroups.delete(sgKey); else collapsedLabelSubgroups.add(sgKey);
                        renderPositionLabelsList(getCurrentPosKey());
                    });

                    const subToggle = document.createElement('span');
                    subToggle.className = 'label-toggle';
                    subToggle.textContent = subgroupExpanded ? '▼' : '▶';
                    const subTitle = document.createElement('span');
                    subTitle.className = 'label-title';
                    subTitle.textContent = eventName;
                    subMainButton.append(subToggle, subTitle);

                    const subActions = document.createElement('div');
                    subActions.className = 'label-item-actions';
                    const subCount = document.createElement('span');
                    subCount.className = 'label-count';
                    subCount.textContent = `${subgroupData.count}件`;
                    subActions.appendChild(subCount);
                    if (showEditButtons) subActions.appendChild(createLabelActionButton('✎', '名前を編集', () => renameSecondLevelLabel(year, eventName)));
                    subActions.appendChild(createLabelActionButton('−', '削除', () => confirmDeleteSecondLevelLabel(year, eventName)));
                    subHeader.append(subMainButton, subActions);
                    if (focusedLabelItemKey === subgroupItemKey) subHeader.classList.add('label-item-focused');
                    subHeader.addEventListener('click', () => {
                        focusedLabelItemKey = subgroupItemKey;
                        focusPositionLabelsTree(subgroupItemKey);
                    });
                    subgroupEl.appendChild(subHeader);

                    if (subgroupExpanded) {
                        const leafTree = document.createElement('div');
                        leafTree.className = 'label-subtree';
                        subgroupData.leaves.sort((a, b) => naturalCollator.compare(a.entry.k3, b.entry.k3));
                        for (const { posKey, entry } of subgroupData.leaves) {
                            const leafItemKey = makeTreeItemKey('leaf', '', '', posKey);
                            visiblePositionLabelItems.push({ key: leafItemKey, type: 'leaf', posKey, parentKey: subgroupItemKey });
                            const leaf = document.createElement('div');
                            leaf.className = 'label-leaf';
                            const row = document.createElement('div');
                            row.className = 'label-leaf-row';
                            row.dataset.itemKey = leafItemKey;
                            row.dataset.posKey = posKey;
                            row.addEventListener('click', () => {
                                focusedLabelItemKey = leafItemKey;
                                if (!isTouchMain()) focusPositionLabelsTree(leafItemKey);
                                jumpToPositionLabel(posKey);
                            });
                            if (posKey === currentPosKey) row.classList.add('current');
                            if (posKey === highlightedLabelPosKey) row.classList.add('highlight');
                            if (focusedLabelItemKey === leafItemKey) row.classList.add('label-item-focused');

                            const main = document.createElement('div');
                            main.className = 'label-leaf-main';

                            const name = document.createElement('span');
                            name.className = 'label-leaf-name';
                            name.textContent = entry.k3;
                            main.appendChild(name);

                            const actions = document.createElement('div');
                            actions.className = 'label-item-actions';
                            if (showEditButtons) actions.appendChild(createLabelActionButton('✎', '名前を編集', () => renameThirdLevelLabel(posKey)));
                            actions.appendChild(createLabelActionButton('−', '削除', () => confirmDeletePositionLabel(posKey)));

                            row.append(main, actions);
                            leaf.appendChild(row);
                            leafTree.appendChild(leaf);
                        }
                        subgroupEl.appendChild(leafTree);
                    }
                    subtree.appendChild(subgroupEl);
                }
                groupEl.appendChild(subtree);
            }
            positionLabelsTree.appendChild(groupEl);
        }

        ensureFocusedLabelItem(currentPosKey);
        const focusedEl = positionLabelsTree.querySelector(`[data-item-key="${CSS.escape(focusedLabelItemKey || '')}"]`);
        if (focusedEl) focusedEl.classList.add('label-item-focused');
    }

    function confirmDeletePositionLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return false;
        const nameKey = buildLabelName(entry.k1, entry.k2, entry.k3);
        if (!confirm(`ラベル「${nameKey}」を削除します。よろしいですか？`)) return false;
        deletePositionLabel(posKey);
        updateUI();
        showToast('ラベルを削除しました');
        return true;
    }

    function deletePositionLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return false;
        const nameKey = buildLabelName(entry.k1, entry.k2, entry.k3);
        delete positionLabels.byPosKey[posKey];
        delete positionLabels.byName[nameKey];
        if (highlightedLabelPosKey === posKey) highlightedLabelPosKey = null;
        clearPositionLabelError();
        return true;
    }

    function deletePositionLabelsByPosKeys(posKeys) {
        let count = 0;
        for (const posKey of posKeys) {
            if (deletePositionLabel(posKey)) count++;
        }
        return count;
    }

    function findNodeIdByPosKey(targetPosKey) {
        for (const nodeId of Object.keys(tree)) {
            if (getCanonicalInfo(nodeId).key === targetPosKey) return nodeId;
        }
        return null;
    }

    function updatePreferredPathToNode(targetNodeId) {
        let nodeId = targetNodeId;
        while (nodeId && nodeId !== 'r') {
            const node = tree[nodeId];
            const parent = tree[node.p];
            if (!node || !parent) break;
            parent.l = nodeId;
            nodeId = node.p;
        }
    }

    function jumpToPositionLabel(posKey) {
        const entry = positionLabels.byPosKey[posKey];
        if (!entry) return;
        let targetNodeId = tree[entry.rep] ? entry.rep : findNodeIdByPosKey(posKey);
        if (!targetNodeId) {
            alert('代表手順が存在しません');
            return;
        }
        updatePreferredPathToNode(targetNodeId);
        currentNodeId = targetNodeId;
        highlightedLabelPosKey = posKey;
        focusedLabelItemKey = makeTreeItemKey('leaf', '', '', posKey);
        updateUI();
    }

    function getFocusedLabelItem() {
        return visiblePositionLabelItems.find((item) => item.key === focusedLabelItemKey) || null;
    }

    function moveFocusedLabelItem(step) {
        if (!visiblePositionLabelItems.length) return;
        const index = focusedLabelItemKey ? getVisibleLabelItemIndex(focusedLabelItemKey) : -1;
        const nextIndex = Math.max(0, Math.min(visiblePositionLabelItems.length - 1, index + step));
        focusedLabelItemKey = visiblePositionLabelItems[nextIndex].key;
        renderPositionLabelsList(getCurrentPosKey());
        scrollFocusedLabelItemIntoView();
    }

    function toggleGroupExpanded(k1, expanded) {
        if (expanded) collapsedLabelGroups.add(k1); else collapsedLabelGroups.delete(k1);
        renderPositionLabelsList(getCurrentPosKey());
        scrollFocusedLabelItemIntoView();
    }

    function toggleSubgroupExpanded(k1, k2, expanded) {
        const key = subgroupKey(k1, k2);
        if (expanded) collapsedLabelSubgroups.add(key); else collapsedLabelSubgroups.delete(key);
        renderPositionLabelsList(getCurrentPosKey());
        scrollFocusedLabelItemIntoView();
    }

    function findFirstChildItemKey(parentKey) {
        const parentIndex = getVisibleLabelItemIndex(parentKey);
        if (parentIndex === -1) return null;
        const parent = visiblePositionLabelItems[parentIndex];
        for (let index = parentIndex + 1; index < visiblePositionLabelItems.length; index++) {
            const item = visiblePositionLabelItems[index];
            if (item.parentKey === parentKey) return item.key;
            if (parent.type === 'group' && item.type === 'group') break;
            if (parent.type === 'subgroup' && (item.type === 'group' || item.type === 'subgroup')) break;
        }
        return null;
    }

    function focusFallbackAfterDelete() {
        if (!visiblePositionLabelItems.length) return null;
        const index = getVisibleLabelItemIndex(focusedLabelItemKey);
        if (index === -1) return visiblePositionLabelItems[0].key;
        if (visiblePositionLabelItems[index + 1]) return visiblePositionLabelItems[index + 1].key;
        if (visiblePositionLabelItems[index - 1]) return visiblePositionLabelItems[index - 1].key;
        return null;
    }

    function handlePositionLabelsTreeKeydown(event) {
        if (document.activeElement !== positionLabelsTree) return;
        const item = getFocusedLabelItem();
        if (!item) return;

        if (event.key === 'ArrowDown') {
            event.preventDefault();
            event.stopPropagation();
            moveFocusedLabelItem(1);
            return;
        }
        if (event.key === 'ArrowUp') {
            event.preventDefault();
            event.stopPropagation();
            moveFocusedLabelItem(-1);
            return;
        }
        if (event.key === 'ArrowLeft') {
            event.preventDefault();
            event.stopPropagation();
            if (item.type === 'group' && item.expanded) {
                toggleGroupExpanded(item.k1, true);
            } else if (item.type === 'subgroup') {
                if (item.expanded) {
                    toggleSubgroupExpanded(item.k1, item.k2, true);
                } else if (item.parentKey) {
                    focusedLabelItemKey = item.parentKey;
                    renderPositionLabelsList(getCurrentPosKey());
                    scrollFocusedLabelItemIntoView();
                }
            } else if (item.type === 'leaf' && item.parentKey) {
                focusedLabelItemKey = item.parentKey;
                renderPositionLabelsList(getCurrentPosKey());
                scrollFocusedLabelItemIntoView();
            }
            return;
        }
        if (event.key === 'ArrowRight') {
            event.preventDefault();
            event.stopPropagation();
            if (item.type === 'group') {
                if (!item.expanded) {
                    toggleGroupExpanded(item.k1, false);
                } else {
                    const childKey = findFirstChildItemKey(item.key);
                    if (childKey) {
                        focusedLabelItemKey = childKey;
                        renderPositionLabelsList(getCurrentPosKey());
                        scrollFocusedLabelItemIntoView();
                    }
                }
            } else if (item.type === 'subgroup') {
                if (!item.expanded) {
                    toggleSubgroupExpanded(item.k1, item.k2, false);
                } else {
                    const childKey = findFirstChildItemKey(item.key);
                    if (childKey) {
                        focusedLabelItemKey = childKey;
                        renderPositionLabelsList(getCurrentPosKey());
                        scrollFocusedLabelItemIntoView();
                    }
                }
            }
            return;
        }
        if (event.key === 'Enter') {
            event.preventDefault();
            event.stopPropagation();
            if (item.type === 'leaf' && item.posKey) jumpToPositionLabel(item.posKey);
            return;
        }
        if (event.key === 'Delete') {
            event.preventDefault();
            event.stopPropagation();
            const fallbackKey = focusFallbackAfterDelete();
            let deleted = false;
            if (item.type === 'group') {
                deleted = confirmDeleteFirstLevelLabel(item.k1);
            } else if (item.type === 'subgroup') {
                deleted = confirmDeleteSecondLevelLabel(item.k1, item.k2);
            } else if (item.type === 'leaf' && item.posKey) {
                deleted = confirmDeletePositionLabel(item.posKey);
            }
            if (deleted && fallbackKey) focusPositionLabelsTree(fallbackKey);
        }
    }

    function drawBoard() {
        bgCtx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
        bgCtx.beginPath(); bgCtx.strokeStyle = '#000'; bgCtx.lineWidth = 1;
        for (let i = 0; i < BOARD_SIZE; i++) {
            bgCtx.moveTo(MARGIN_L + i * CELL_SIZE, MARGIN_T);
            bgCtx.lineTo(MARGIN_L + i * CELL_SIZE, MARGIN_T + (BOARD_SIZE - 1) * CELL_SIZE);
            bgCtx.moveTo(MARGIN_L, MARGIN_T + i * CELL_SIZE);
            bgCtx.lineTo(MARGIN_L + (BOARD_SIZE - 1) * CELL_SIZE, MARGIN_T + i * CELL_SIZE);
        }
        bgCtx.stroke();
        const stars = [[3,3], [11,3], [7,7], [3,11], [11,11]];
        bgCtx.fillStyle = '#000';
        for (let [x, y] of stars) { bgCtx.beginPath(); bgCtx.arc(MARGIN_L + x * CELL_SIZE, MARGIN_T + y * CELL_SIZE, 3, 0, Math.PI * 2); bgCtx.fill(); }
        if (showCoords) {
            bgCtx.fillStyle = '#333'; bgCtx.font = '14px Arial'; bgCtx.textAlign = 'center'; bgCtx.textBaseline = 'middle';
            for (let i = 0; i < BOARD_SIZE; i++) {
                bgCtx.fillText(String.fromCharCode(65 + i), MARGIN_L + i * CELL_SIZE, LOGICAL_H - 15);
                bgCtx.fillText((BOARD_SIZE - i).toString(), 15, MARGIN_T + i * CELL_SIZE);
            }
        }
    }

    function applyBoardTheme() {
        bgCanvas.style.backgroundColor = boardThemes[boardThemeIndex].color;
        updateViewMenuButtons();
    }

    function drawStonesAndHighlights(data, bestI) {
        let path = []; let curr = tree[currentNodeId];
        while (curr && curr.i !== 'r') { path.unshift(curr); curr = tree[curr.p]; }
        for (let node of path) {
            let sx = MARGIN_L + node.x * CELL_SIZE, sy = MARGIN_T + node.y * CELL_SIZE;
            ctx.beginPath(); ctx.arc(sx, sy, CELL_SIZE * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = node.o === 1 ? '#000' : '#fff'; ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = '#333'; ctx.stroke();
            if (showMoveNumbers) {
                const moveText = node.m.toString();
                const moveTextY = sy + Math.max(1, Math.round(CELL_SIZE * 0.03));
                ctx.fillStyle = node.o === 1 ? '#eee' : '#333';
                ctx.font = `600 ${Math.max(14, Math.floor(CELL_SIZE * 0.42))}px 'Segoe UI', 'Yu Gothic UI', Meiryo, sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = node.o === 1 ? 'rgba(0, 0, 0, 0.55)' : 'rgba(255, 255, 255, 0.9)';
                ctx.strokeText(moveText, sx, moveTextY);
                ctx.fillText(moveText, sx, moveTextY);
            }
        }

        if (showHints) {
            if (data.n) {
                for (let key in data.n) {
                    let [cx, cy] = key.split(',').map(Number);
                    let [px, py] = transform(cx, cy, bestI);
                    if (data.l && data.l[`${cx},${cy}`]) continue;
                    ctx.beginPath(); ctx.fillStyle = 'rgba(128, 128, 128, 0.8)';
                    ctx.arc(MARGIN_L + px * CELL_SIZE, MARGIN_T + py * CELL_SIZE, 5, 0, Math.PI * 2); ctx.fill();
                }
            }
            if (data.l) {
                for (let key in data.l) {
                    let [cx, cy] = key.split(',').map(Number);
                    let [px, py] = transform(cx, cy, bestI);
                    let sx = MARGIN_L + px * CELL_SIZE, sy = MARGIN_T + py * CELL_SIZE;
                    ctx.font = `bold ${Math.floor(CELL_SIZE*0.48)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)'; ctx.lineWidth = 3.5; ctx.strokeText(data.l[key], sx, sy);
                    ctx.fillStyle = '#555'; ctx.fillText(data.l[key], sx, sy);
                }
            }
        }
    }

    function isTouchMain() {
        return window.matchMedia('(pointer: coarse)').matches
            && window.matchMedia('(hover: none)').matches
            && window.innerWidth <= 1199;
    }

    function restoreBoardControlsPosition() {
        if (boardControlsAnchor.parentNode !== leftPane) leftPane.insertBefore(boardControlsAnchor, leftPane.firstChild);
        if (boardControls.parentNode !== leftPane || boardControls.previousSibling !== boardControlsAnchor) {
            leftPane.insertBefore(boardControls, boardControlsAnchor.nextSibling);
        }
    }

    function getControlMenuElements(name) {
        if (name === 'file') return { name, button: fileMenuBtn, menu: fileMenu };
        if (name === 'view') return { name, button: viewMenuBtn, menu: viewMenu };
        return null;
    }

    function closeControlMenus() {
        for (const name of ['file', 'view']) {
            const elements = getControlMenuElements(name);
            elements.menu.hidden = true;
            elements.button.classList.remove('active');
            elements.button.setAttribute('aria-expanded', 'false');
        }
        currentOpenControlMenu = null;
        document.body.classList.remove('control-menu-open');
    }

    function getCurrentTranslation() {
        return translations[currentLanguage] || translations.ja;
    }

    function updateFileMenuButtons() {
        const text = getCurrentTranslation();
        fileOpenActionBtn.textContent = text.open;
        fileExportActionBtn.textContent = text.export;
        fileExportActionBtn.hidden = false;
        fileSaveActionBtn.textContent = text.save;
    }

    function applyLanguage() {
        const text = getCurrentTranslation();
        document.documentElement.lang = currentLanguage === 'zh' ? 'zh-CN' : 'ja';
        document.title = text.title;
        fileMenuBtn.setAttribute('aria-label', text.fileMenuAria);
        viewMenuBtn.setAttribute('aria-label', text.viewMenuAria);
        languageActionBtn.textContent = text.language;
        languageActionBtn.dataset.value = text.languageShort;
        fileDeleteMoveActionBtn.textContent = text.deleteMove;
        updateFileMenuButtons();
        guideText.innerHTML = text.guideHtml;
        commentTabBtn.textContent = text.commentTab;
        positionLabelsTabBtn.textContent = text.labelsTab;
        labelInput1.placeholder = text.labelInput1Placeholder;
        labelInput2.placeholder = text.labelInput2Placeholder;
        labelInput3.placeholder = text.labelInput3Placeholder;
        registerPositionLabelBtn.textContent = text.registerLabel;
        positionLabelsTree.setAttribute('aria-label', text.positionLabelsAria);
        updateCommentEditable();
    }

    function toggleControlMenu(name) {
        const elements = getControlMenuElements(name);
        if (!elements) return;
        const shouldOpen = currentOpenControlMenu !== name || elements.menu.hidden;
        closeControlMenus();
        if (!shouldOpen) return;
        elements.menu.hidden = false;
        elements.button.classList.add('active');
        elements.button.setAttribute('aria-expanded', 'true');
        currentOpenControlMenu = name;
        document.body.classList.add('control-menu-open');
    }

    function updateViewMenuButtons() {
        const text = getCurrentTranslation();
        toggleCoordsActionBtn.textContent = text.coords;
        cycleBoardThemeActionBtn.textContent = text.boardTheme;
        cycleBoardThemeActionBtn.dataset.value = boardThemes[boardThemeIndex].label;
        toggleSideTabsActionBtn.textContent = text.sideTabs;
        toggleMoveNumbersActionBtn.textContent = text.moveNumbers;
        toggleHintsActionBtn.textContent = text.hints;
        toggleHintsActionBtn.classList.toggle('active', showHints);
        toggleCoordsActionBtn.classList.toggle('active', showCoords);
        toggleMoveNumbersActionBtn.classList.toggle('active', showMoveNumbers);
        toggleSideTabsActionBtn.classList.toggle('active', showSideTabs);
        cycleBoardThemeActionBtn.classList.remove('active');
    }

    function shouldShowBottomControls() {
        return isTouchMain() || window.innerWidth <= 1199;
    }

    function updateTouchMainLayout() {
        document.body.classList.toggle('bottom-controls-layout', shouldShowBottomControls());
        if (shouldShowBottomControls()) {
            if (boardControls.parentNode !== container || boardControls.previousSibling !== rightPane) {
                container.insertBefore(boardControls, rightPane.nextSibling);
            }
        } else {
            restoreBoardControlsPosition();
        }
    }

    function updateCommentEditable() {
        document.body.classList.toggle('touch-main', isTouchMain());
        commentArea.readOnly = isTouchMain() || !showHints;
        commentArea.placeholder = isTouchMain() ? '' : getCurrentTranslation().commentPlaceholder;
        updateTouchMainLayout();
        updateFileMenuButtons();
        updateViewMenuButtons();
        if (tree.r) renderPositionLabelsList(getCurrentPosKey());
    }

    applyLanguage();
    window.matchMedia('(pointer: coarse)').addEventListener('change', updateCommentEditable);
    window.matchMedia('(hover: none)').addEventListener('change', updateCommentEditable);
    window.addEventListener('resize', () => {
        updateTouchMainLayout();
        closeControlMenus();
    });

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = LOGICAL_W / rect.width, scaleY = LOGICAL_H / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX, mouseY = (e.clientY - rect.top) * scaleY;
        const px = Math.round((mouseX - MARGIN_L) / CELL_SIZE), py = Math.round((mouseY - MARGIN_T) / CELL_SIZE);
        if (px < 0 || px >= BOARD_SIZE || py < 0 || py >= BOARD_SIZE) return;

        const { key, index } = getCanonicalInfo(currentNodeId);
        const [cx, cy] = inverseTransform(px, py, index);

        if (e.ctrlKey) {
            if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
            if (!posDb[key].l) posDb[key].l = {};
            let currentText = posDb[key].l[`${cx},${cy}`] || '';
            let newText = prompt('交点テキストを入力:', currentText);
            if (newText !== null) {
                if (newText === '') delete posDb[key].l[`${cx},${cy}`]; else posDb[key].l[`${cx},${cy}`] = newText;
                updateUI();
            }
            return;
        }

        let node = tree[currentNodeId];
        for (let cid of node.c) {
            if (tree[cid].x === px && tree[cid].y === py) {
                if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
                if (!posDb[key].n) posDb[key].n = {};
                posDb[key].n[`${cx},${cy}`] = 1;
                node.l = cid;
                currentNodeId = cid;
                updateUI();
                return;
            }
        }
        let temp = currentNodeId;
        while (temp !== 'r') {
            if (tree[temp].x === px && tree[temp].y === py) {
                goNext();
                return;
            }
            temp = tree[temp].p;
        }

        if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
        if (!posDb[key].n) posDb[key].n = {};
        posDb[key].n[`${cx},${cy}`] = 1;

        let nid = '' + nextNodeId++;
        tree[nid] = { i: nid, p: currentNodeId, c: [], x: px, y: py, o: node.m % 2 === 0 ? 1 : 2, m: node.m + 1 };
        node.c.push(nid); node.l = nid; currentNodeId = nid; updateUI();
    });

    commentArea.addEventListener('input', (e) => {
        const { key } = getCanonicalInfo(currentNodeId);
        if (!posDb[key]) posDb[key] = { c: '', l: {}, n: {} };
        posDb[key].c = e.target.value;
    });

    commentArea.addEventListener('keydown', (e) => {
        if (document.activeElement !== commentArea) return;
        if (!(e.ctrlKey || e.metaKey)) return;

        const key = e.key.toLowerCase();
        if (key === 's') {
            e.preventDefault();
            saveKifu();
            return;
        }
        if (key === 'o') {
            e.preventDefault();
            openFile();
            return;
        }

        const start = commentArea.selectionStart;
        const end = commentArea.selectionEnd;
        const value = commentArea.value;

        if (key === 'j') {
            e.preventDefault();
            insertText('\n');
        } else if (key === 'h') {
            e.preventDefault();
            if (start === end && start > 0) {
                commentArea.value = value.slice(0, start - 1) + value.slice(end);
                setCursor(start - 1);
            } else {
                commentArea.value = value.slice(0, start) + value.slice(end);
                setCursor(start);
            }
        }

        function insertText(text) {
            commentArea.value = value.slice(0, start) + text + value.slice(end);
            setCursor(start + text.length);
        }

        function setCursor(pos) {
            commentArea.selectionStart = commentArea.selectionEnd = pos;
            commentArea.dispatchEvent(new Event('input'));
        }
    });

    positionLabelErrorAction.addEventListener('click', () => {
        if (labelErrorActionHandler) labelErrorActionHandler();
    });
    positionLabelsTree.addEventListener('focus', () => {
        if (!focusedLabelItemKey && visiblePositionLabelItems.length) {
            focusedLabelItemKey = visiblePositionLabelItems[0].key;
        }
        renderPositionLabelsList(getCurrentPosKey());
        requestAnimationFrame(scrollFocusedLabelItemIntoView);
    });
    positionLabelsTree.addEventListener('keydown', handlePositionLabelsTreeKeydown);
    function toggleHints() {
        showHints = !showHints;
        commentArea.classList.toggle('hidden-hint', !showHints);
        updateUI();
        updateCommentEditable();
    }

    function toggleCoords() {
        showCoords = !showCoords;
        if (showCoords) {
            CELL_SIZE = 40; MARGIN_L = 35; MARGIN_R = 25; MARGIN_T = 25; MARGIN_B = 35;
        } else {
            CELL_SIZE = (620-40)/14; MARGIN_L = MARGIN_R = MARGIN_T = MARGIN_B = 20;
        }
        drawBoard();
        updateUI();
        updateViewMenuButtons();
    }

    function toggleMoveNumbers() {
        showMoveNumbers = !showMoveNumbers;
        updateUI();
        updateViewMenuButtons();
    }

    function openFileFromMenu() {
        closeControlMenus();
        openFile();
    }

    async function saveKifuWithConfirmFromMenu() {
        closeControlMenus();
        await saveKifuWithConfirm();
    }

    async function exportKifuFromMenu() {
        closeControlMenus();
        await exportKifu();
    }

    function deleteCurrentNodeFromMenu() {
        closeControlMenus();
        deleteCurrentNode();
    }

    function cycleLanguage() {
        currentLanguage = currentLanguage === 'ja' ? 'zh' : 'ja';
        applyLanguage();
    }

    function cycleLanguageFromMenu() {
        closeControlMenus();
        cycleLanguage();
    }

    function toggleHintsFromMenu() {
        closeControlMenus();
        toggleHints();
    }

    function toggleCoordsFromMenu() {
        closeControlMenus();
        toggleCoords();
    }

    function cycleBoardTheme() {
        boardThemeIndex = (boardThemeIndex + 1) % boardThemes.length;
        applyBoardTheme();
    }

    function cycleBoardThemeFromMenu() {
        closeControlMenus();
        cycleBoardTheme();
    }

    function toggleMoveNumbersFromMenu() {
        closeControlMenus();
        toggleMoveNumbers();
    }

    function toggleSideTabsFromMenu() {
        closeControlMenus();
        toggleSideTabsVisibility();
    }

    function getPreferredChildId(node) {
        if (!node) return null;
        const validChildren = node.c.filter((id) => tree[id]);
        if (validChildren.length !== node.c.length) {
            node.c = validChildren;
        }

        if (!validChildren.length) {
            if (node.l && !tree[node.l]) node.l = null;
            return null;
        }

        if (node.l && tree[node.l] && validChildren.includes(node.l)) {
            return node.l;
        }

        node.l = validChildren[0];
        return node.l;
    }

    function goBack() { if (tree[currentNodeId].p) { currentNodeId = tree[currentNodeId].p; updateUI(); } }
    function goNext() {
        let node = tree[currentNodeId], target = getPreferredChildId(node);
        if (target) { currentNodeId = target; updateUI(); }
    }
    function goToPrevBranch() { let curr = tree[currentNodeId]; while (curr.p) { curr = tree[curr.p]; if (curr.c.length > 1 || curr.i === 'r') { currentNodeId = curr.i; updateUI(); return; } } }
    function goToNextBranch() {
        let curr = tree[currentNodeId], target = getPreferredChildId(curr);
        while (target) {
            curr = tree[target];
            if (curr.c.length > 1 || curr.c.length === 0) { currentNodeId = curr.i; updateUI(); return; }
            target = getPreferredChildId(curr);
        }
    }

    function deleteCurrentNode() {
        if (currentNodeId === 'r') return;
        if (!confirm(getCurrentTranslation().deleteCurrentNodeConfirm)) return;
        const tid = currentNodeId;
        const nodeToRemove = tree[tid];
        const pid = nodeToRemove.p;

        const { key: pKey, index: pIndex } = getCanonicalInfo(pid);
        const [cx, cy] = inverseTransform(nodeToRemove.x, nodeToRemove.y, pIndex);
        if (posDb[pKey] && posDb[pKey].n) {
            delete posDb[pKey].n[`${cx},${cy}`];
        }

        const deletedPosKeys = new Set();
        const del = (id) => {
            const { key: dKey } = getCanonicalInfo(id);
            deletedPosKeys.add(dKey);
            delete posDb[dKey];
            tree[id].c.forEach(del);
            delete tree[id];
        };
        del(tid);

        const deletedLabelCount = deletePositionLabelsByPosKeys(deletedPosKeys);
        tree[pid].c = tree[pid].c.filter((id) => id !== tid);
        if (tree[pid].l === tid) {
            tree[pid].l = tree[pid].c[0] || null;
        }
        currentNodeId = pid;
        updateUI();
        if (deletedLabelCount > 0) showToast(getCurrentTranslation().deletedLabelsToast({ count: deletedLabelCount }));
    }

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.code === 'Semicolon') {
            e.preventDefault();
            toggleSideTab();
            return;
        }
        if (document.activeElement === commentArea) {
            if ((e.ctrlKey || e.metaKey) && e.code === 'Semicolon') {
                e.preventDefault();
                toggleActiveTabFocus();
            }
            return;
        }
        if (e.ctrlKey || e.metaKey) {
            const key = e.key.toLowerCase();
            if (e.code === 'Semicolon') { e.preventDefault(); toggleActiveTabFocus(); }
            else if (key === 's' && e.shiftKey) { e.preventDefault(); saveKifu(); }
            else if (key === 's') { e.preventDefault(); exportKifu(); }
            else if (key === 'o') { e.preventDefault(); openFile(); }
            else if (key === 'f') { e.preventDefault(); toggleHints(); }
            return;
        }
        if (document.activeElement === positionLabelsTree) {
            return;
        }
        switch (e.key) {
            case 'h': e.preventDefault(); goToPrevBranch(); break;
            case 'j': e.preventDefault(); goBack(); break;
            case 'k': e.preventDefault(); goNext(); break;
            case 'l': e.preventDefault(); goToNextBranch(); break;
            case 'ArrowLeft': e.preventDefault(); goBack(); break;
            case 'ArrowRight': e.preventDefault(); goNext(); break;
            case 'ArrowUp': e.preventDefault(); goToPrevBranch(); break;
            case 'ArrowDown': e.preventDefault(); goToNextBranch(); break;
            case 'Delete': deleteCurrentNode(); break;
        }
    });

    let fileHandle = null;

    function openSaveDatabase() {
        if (saveDbPromise) return saveDbPromise;
        saveDbPromise = new Promise((resolve, reject) => {
            const request = window.indexedDB.open(SAVE_DB_NAME, 1);
            request.onupgradeneeded = () => {
                const db = request.result;
                if (!db.objectStoreNames.contains(SAVE_STORE_NAME)) {
                    db.createObjectStore(SAVE_STORE_NAME);
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('IndexedDB open failed'));
        });
        return saveDbPromise;
    }

    async function saveKifuToIndexedDb() {
        const db = await openSaveDatabase();
        const payload = {
            updatedAt: Date.now(),
            data: buildSaveData(),
            settings: buildAppSettings(),
        };

        await new Promise((resolve, reject) => {
            const tx = db.transaction(SAVE_STORE_NAME, 'readwrite');
            tx.oncomplete = () => resolve();
            tx.onabort = () => reject(tx.error || new Error('IndexedDB save aborted'));
            tx.onerror = () => reject(tx.error || new Error('IndexedDB save failed'));
            tx.objectStore(SAVE_STORE_NAME).put(payload, SAVE_RECORD_KEY);
        });
    }

    async function restoreKifuFromIndexedDb() {
        const db = await openSaveDatabase();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(SAVE_STORE_NAME, 'readonly');
            const request = tx.objectStore(SAVE_STORE_NAME).get(SAVE_RECORD_KEY);
            request.onsuccess = () => resolve(request.result || null);
            request.onerror = () => reject(request.error || new Error('IndexedDB read failed'));
        });
    }

    function openFallbackFilePicker() {
        fileInput.value = '';
        if (typeof fileInput.showPicker === 'function') {
            try {
                fileInput.showPicker();
                return;
            } catch (error) {
                // Fall back to click when showPicker is unavailable or blocked.
            }
        }
        fileInput.focus({ preventScroll: true });
        fileInput.click();
    }

    async function openFile() {
        if (window.showOpenFilePicker) {
            try {
                const [handle] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
                fileHandle = handle;
                const file = await handle.getFile();
                loadFromText(await file.text());
            } catch (e) {
                if (e.name !== 'AbortError') alert(getCurrentTranslation().loadFailed);
            }
        } else {
            openFallbackFilePicker();
        }
    }

    function loadFromText(text) {
        try {
            const data = JSON.parse(text);
            tree = data.t;
            posDb = data.p || {};
            currentNodeId = data.c;
            nextNodeId = data.n;
            positionLabels = normalizePositionLabels(data.pl);
            highlightedLabelPosKey = null;
            clearPositionLabelError();
            clearCanonicalCache();
            updateUI();
        } catch (err) {
            alert(getCurrentTranslation().loadFailed);
        }
    }

    function showToast(msg) {
        const el = document.createElement('div');
        el.textContent = msg;
        el.style = `
            position:fixed; bottom:20px; right:20px;
            background:#333; color:#fff; padding:8px 12px;
            border-radius:6px; opacity:0.9; z-index:1000;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1500);
    }

    function buildSaveData() {
        return { t: tree, p: posDb, c: currentNodeId, n: nextNodeId, pl: positionLabels };
    }

    function buildShareFile() {
        const json = JSON.stringify(buildSaveData());
        return new File([json], `renju_${Date.now()}.json`, { type: 'application/json' });
    }

    function downloadJson() {
        const json = JSON.stringify(buildSaveData());
        const fileName = `renju_${Date.now()}.json`;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
        a.download = fileName;
        a.click();
        showToast(getCurrentTranslation().exportCompletedWithName({ name: fileName }));
    }

    async function exportKifu() {
        const text = getCurrentTranslation();
        if (!isTouchMain()) {
            await exportKifuToFile();
            return;
        }

        if (!navigator.share) {
            showToast(text.exportUnavailable);
            return;
        }

        const file = buildShareFile();
        const shareData = { title: document.title, files: [file] };
        const fallbackShareData = { title: document.title, text: await file.text() };

        try {
            if (!navigator.canShare || navigator.canShare(shareData)) {
                await navigator.share(shareData);
            } else {
                await navigator.share(fallbackShareData);
            }
            showToast(text.exportCompleted);
        } catch (e) {
            if (e && e.name === 'AbortError') return;
            showToast(text.exportFailed);
        }
    }

    async function exportKifuToFile() {
        const json = JSON.stringify(buildSaveData());
        if (!window.showSaveFilePicker) { downloadJson(); return; }

        try {
            if (!fileHandle) {
                fileHandle = await window.showSaveFilePicker({
                    suggestedName: `renju_${Date.now()}.json`,
                    types: [{ description: getCurrentTranslation().jsonFileDescription, accept: { 'application/json': ['.json'] } }]
                });
            }
            const writable = await fileHandle.createWritable();
            await writable.write(json);
            await writable.close();
            showToast(getCurrentTranslation().exportCompletedWithName({ name: fileHandle.name }));
        } catch (e) {
            // キャンセル or エラー → 何もしない
        }
    }

    async function saveKifu() {
        try {
            await saveKifuToIndexedDb();
            showToast(getCurrentTranslation().saveCompleted);
        } catch (e) {
            showToast(getCurrentTranslation().localSaveFailed);
        }
    }

    async function saveKifuWithConfirm() {
        await saveKifu();
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        fileHandle = null;
        const reader = new FileReader();
        reader.onload = (ev) => loadFromText(ev.target.result);
        reader.readAsText(file);
        e.target.value = '';
    });

    canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); goBack(); });
    document.addEventListener('contextmenu', (e) => {
        if (allowsNativeContextMenu(e.target)) return;
        suppressLongPressMenu(e);
    }, { capture: true });
    document.addEventListener('selectstart', (e) => {
        if (!shouldBlockSelection(e.target)) return;
        e.preventDefault();
    }, { capture: true });
    document.addEventListener('dragstart', (e) => {
        if (!shouldBlockSelection(e.target)) return;
        e.preventDefault();
    }, { capture: true });
    if (isTouchMain()) {
        document.addEventListener('touchmove', (e) => {
            const allowScroll = commentArea.contains(e.target) || positionLabelsPanel.contains(e.target);
            if (!allowScroll) e.preventDefault();
        }, { passive: false });
        document.addEventListener('dblclick', (e) => {
            e.preventDefault();
        }, { passive: false });
        for (const eventName of ['gesturestart', 'gesturechange', 'gestureend']) {
            document.addEventListener(eventName, (e) => {
                e.preventDefault();
            }, { passive: false });
        }
    }

    document.addEventListener('click', (e) => {
        if (!currentOpenControlMenu) return;
        const elements = getControlMenuElements(currentOpenControlMenu);
        if (elements.button.contains(e.target) || elements.menu.contains(e.target)) return;
        closeControlMenus();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeControlMenus();
    });

    document.addEventListener('dragover', (e) => {
        e.preventDefault();
    });

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file) return;
        if (!file.name.endsWith('.json')) {
            alert('JSONファイルをドロップしてください');
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => loadFromText(ev.target.result);
        reader.readAsText(file);
        fileHandle = null;
    });

    window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = '';
    });

    commentArea.addEventListener('focus', (e) => {
        if (isTouchMain()) e.target.blur();
    });

    initGame();
    if (window.indexedDB) {
        restoreKifuFromIndexedDb()
            .then((saved) => {
                if (!saved) return;
                if (saved.data) {
                    loadFromText(JSON.stringify(saved.data));
                }
                if (saved.settings) {
                    applyAppSettings(saved.settings);
                }
            })
            .catch(() => {
                // Ignore restore failures and keep a clean board.
            });
    }
</script>
