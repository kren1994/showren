<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連珠 検討用ボード</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .container {
            display: flex;
            gap: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            flex-wrap: wrap; /* スマホ用縦並び対応 */
            max-width: 100%;
            box-sizing: border-box;
        }
        .left-pane {
            flex: 1 1 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 0 auto;
        }
        .right-pane {
            flex: 1 1 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 0 auto;
        }
        .board-container {
            position: relative;
            width: 100%;
        }
        canvas {
            background-color: #e3c482;
            border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            cursor: pointer;
            max-width: 100%; /* スマホ画面に収める */
            height: auto;
            display: block;
        }
        .board-controls {
            display: flex;
            gap: 5px;
            width: 100%;
        }
        .board-controls button {
            flex: 1;
            padding: 12px 0; /* スマホでタップしやすいようやや大きく */
            border: 1px solid #ccc;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .board-controls button:hover {
            background: #e9e9e9;
        }
        .load-btn {
            background: #e0f0ff !important;
            border-color: #b0d0ff !important;
            color: #0055aa;
        }
        .load-btn:hover {
            background: #cce4ff !important;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            min-height: 120px; /* スマホでの最低高さを確保 */
            resize: vertical;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus {
            border-color: #3080ff;
            box-shadow: 0 0 5px rgba(48, 128, 255, 0.5);
        }
        .guide {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            background: #f9f9fb;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        /* PC向けの横並びレイアウト（画面幅が大きい場合） */
        @media (min-width: 800px) {
            .container {
                flex-wrap: nowrap;
            }
            .left-pane {
                width: 600px;
                flex: 0 0 auto;
            }
            .right-pane {
                width: 320px;
                flex: 0 0 auto;
            }
            textarea {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左側：盤面と操作ボタン -->
    <div class="left-pane">
        <div class="board-container">
            <canvas id="boardCanvas" width="600" height="600"></canvas>
        </div>
        <div class="board-controls">
            <button onclick="goToStart()" title="最初に戻る">|&lt;</button>
            <button onclick="goToPrevBranch()" title="ひとつ前の分岐">&lt;&lt;</button>
            <button onclick="goBack()" title="1手戻る">&lt;</button>
            <button onclick="goNext()" title="1手進む">&gt;</button>
            <button onclick="goToNextBranch()" title="ひとつ後の分岐">&gt;&gt;</button>
            <button onclick="goToEnd()" title="最後まで進む">&gt;|</button>
            <button class="load-btn" onclick="document.getElementById('fileInput').click()" title="棋譜を読み込む">読込</button>
            <input type="file" id="fileInput" accept=".json" style="display:none;">
        </div>
    </div>

    <!-- 右側：ガイドとコメントエリア -->
    <div class="right-pane">
        <div class="guide">
            ・<b>Delete</b> で最新の手を削除 / <b>Ctrl+Z</b> で元に戻す<br>
            ・<b>Ctrl+S</b> で保存 / <b>Ctrl+O</b> で読込<br>
            ・<b>Ctrl+[</b> でコメント入力と盤面を行き来
        </div>
        <textarea id="commentArea" placeholder="ここに局面のコメントを入力..."></textarea>
    </div>
</div>

<script>
    const BOARD_SIZE = 15;
    const CELL_SIZE = 36;
    const MARGIN = 40;
    const CANVAS_SIZE = CELL_SIZE * (BOARD_SIZE - 1) + MARGIN * 2;
    
    const canvas = document.getElementById('boardCanvas');
    canvas.width = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;
    const ctx = canvas.getContext('2d');
    const commentArea = document.getElementById('commentArea');

    let tree = {};
    let currentNodeId = 'root';
    let nextNodeId = 1;
    let undoStack = []; 

    function initGame() {
        tree = {
            'root': { id: 'root', parent: null, children: [], x: null, y: null, color: 0, comment: '', moveNumber: 0, lastSelectedChild: null }
        };
        currentNodeId = 'root';
        nextNodeId = 1;
        undoStack = [];
        updateUI();
    }

    function pushUndo() {
        undoStack.push(JSON.stringify({ tree, currentNodeId, nextNodeId }));
        if (undoStack.length > 50) undoStack.shift(); 
    }

    function undo() {
        if (undoStack.length === 0) return;
        const state = JSON.parse(undoStack.pop());
        tree = state.tree;
        currentNodeId = state.currentNodeId;
        nextNodeId = state.nextNodeId;
        updateUI();
    }

    function deleteCurrentNode() {
        if (currentNodeId === 'root') return;
        pushUndo();
        const targetId = currentNodeId;
        const parentId = tree[targetId].parent;
        
        tree[parentId].children = tree[parentId].children.filter(id => id !== targetId);
        
        function removeRecursive(id) {
            let node = tree[id];
            if (!node) return;
            for (let childId of node.children) removeRecursive(childId);
            delete tree[id];
        }
        removeRecursive(targetId);
        
        currentNodeId = parentId;
        updateUI();
    }

    function getScreenPos(x, y) {
        return { sx: MARGIN + x * CELL_SIZE, sy: MARGIN + y * CELL_SIZE };
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e3c482';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.beginPath();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        for (let i = 0; i < BOARD_SIZE; i++) {
            ctx.moveTo(MARGIN + i * CELL_SIZE, MARGIN);
            ctx.lineTo(MARGIN + i * CELL_SIZE, MARGIN + (BOARD_SIZE - 1) * CELL_SIZE);
            ctx.moveTo(MARGIN, MARGIN + i * CELL_SIZE);
            ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * CELL_SIZE, MARGIN + i * CELL_SIZE);
        }
        ctx.stroke();

        const stars = [[3,3], [11,3], [7,7], [3,11], [11,11]];
        ctx.fillStyle = '#000';
        for (let [x, y] of stars) {
            ctx.beginPath();
            ctx.arc(MARGIN + x * CELL_SIZE, MARGIN + y * CELL_SIZE, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.fillStyle = '#333';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < BOARD_SIZE; i++) {
            ctx.fillText(String.fromCharCode(65 + i), MARGIN + i * CELL_SIZE, canvas.height - 15);
            ctx.fillText((BOARD_SIZE - i).toString(), 15, MARGIN + i * CELL_SIZE);
        }
    }

    function drawStonesAndHighlights() {
        let path = [];
        let curr = tree[currentNodeId];
        while (curr.id !== 'root') {
            path.unshift(curr);
            curr = tree[curr.parent];
        }

        for (let node of path) {
            let { sx, sy } = getScreenPos(node.x, node.y);
            
            ctx.beginPath();
            ctx.arc(sx, sy, CELL_SIZE * 0.45, 0, Math.PI * 2);
            ctx.fillStyle = node.color === 1 ? '#000' : '#fff';
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#333';
            ctx.stroke();

            ctx.fillStyle = node.color === 1 ? '#fff' : '#000';
            ctx.font = 'bold 12px Arial';
            ctx.fillText(node.moveNumber.toString(), sx, sy);
        }

        let currentNode = tree[currentNodeId];
        for (let childId of currentNode.children) {
            let child = tree[childId];
            let { sx, sy } = getScreenPos(child.x, child.y);
            ctx.beginPath();
            ctx.fillStyle = 'rgba(30, 144, 255, 0.9)'; 
            ctx.arc(sx, sy, 5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function updateUI() {
        drawBoard();
        drawStonesAndHighlights();
        let node = tree[currentNodeId];
        commentArea.value = node.comment || "";
    }

    function getPreferredChild(nodeId) {
        let node = tree[nodeId];
        if (node.children.length === 0) return null;
        if (node.lastSelectedChild && node.children.includes(node.lastSelectedChild)) {
            return node.lastSelectedChild;
        }
        return node.children[0];
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        // 画面縮小時のスケールを計算して正確な座標を取得
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const x = Math.round((mouseX - MARGIN) / CELL_SIZE);
        const y = Math.round((mouseY - MARGIN) / CELL_SIZE);

        if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return;

        let currentNode = tree[currentNodeId];

        for (let childId of currentNode.children) {
            let child = tree[childId];
            if (child.x === x && child.y === y) {
                tree[currentNodeId].lastSelectedChild = childId; 
                currentNodeId = childId;
                updateUI();
                return;
            }
        }

        let tempId = currentNodeId;
        while (tempId !== 'root') {
            let n = tree[tempId];
            if (n.x === x && n.y === y) return;
            tempId = n.parent;
        }

        pushUndo();

        let newNodeId = 'node_' + (nextNodeId++);
        tree[newNodeId] = {
            id: newNodeId, parent: currentNodeId, children: [],
            x: x, y: y, color: currentNode.moveNumber % 2 === 0 ? 1 : 2,
            comment: "", moveNumber: currentNode.moveNumber + 1, lastSelectedChild: null
        };
        tree[currentNodeId].children.push(newNodeId);
        tree[currentNodeId].lastSelectedChild = newNodeId; 
        currentNodeId = newNodeId;
        updateUI();
    });

    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        goBack();
    });

    commentArea.addEventListener('input', (e) => {
        tree[currentNodeId].comment = e.target.value;
    });

    function goToStart() { currentNodeId = 'root'; updateUI(); }
    function goBack() { 
        if (tree[currentNodeId].parent) { 
            currentNodeId = tree[currentNodeId].parent; 
            updateUI(); 
        } 
    }
    function goNext() {
        let next = getPreferredChild(currentNodeId);
        if (next) { currentNodeId = next; updateUI(); }
    }
    function goToEnd() {
        let next = getPreferredChild(currentNodeId);
        while (next) {
            currentNodeId = next;
            next = getPreferredChild(currentNodeId);
        }
        updateUI();
    }
    function goToPrevBranch() {
        let curr = tree[currentNodeId];
        while (curr.parent) {
            curr = tree[curr.parent];
            if (curr.children.length > 1 || curr.id === 'root') {
                currentNodeId = curr.id; updateUI(); return;
            }
        }
    }
    function goToNextBranch() {
        let curr = tree[currentNodeId];
        let nextId = getPreferredChild(curr.id);
        while (nextId) {
            curr = tree[nextId];
            if (curr.children.length > 1 || curr.children.length === 0) {
                currentNodeId = curr.id; updateUI(); return;
            }
            nextId = getPreferredChild(curr.id);
        }
    }

    document.addEventListener('keydown', (e) => {
        const isTextArea = (document.activeElement === commentArea);

        if (e.ctrlKey || e.metaKey) {
            const key = e.key.toLowerCase();
            if (e.key === '[') {
                e.preventDefault();
                if (isTextArea) commentArea.blur();
                else commentArea.focus();
                return;
            }
            if (key === 'z') {
                if (!isTextArea) { e.preventDefault(); undo(); }
                return;
            }
            if (key === 's') {
                e.preventDefault();
                saveKifu();
                return;
            }
            if (key === 'o') {
                e.preventDefault();
                document.getElementById('fileInput').click();
                return;
            }
        }

        if (isTextArea) return;

        switch(e.key) {
            case 'h': case 'ArrowLeft': e.preventDefault(); goBack(); break;
            case 'l': case 'ArrowRight': e.preventDefault(); goNext(); break;
            case 'k': case 'ArrowUp': e.preventDefault(); goToPrevBranch(); break;
            case 'j': case 'ArrowDown': e.preventDefault(); goToNextBranch(); break;
            case 'Delete': e.preventDefault(); deleteCurrentNode(); break;
        }
    });

    function saveKifu() {
        const data = { tree: tree, currentNodeId: currentNodeId, nextNodeId: nextNodeId };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `renju_kifu_${new Date().getTime()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data && data.tree) {
                    tree = data.tree;
                    currentNodeId = data.currentNodeId || 'root';
                    nextNodeId = data.nextNodeId || 1;
                    undoStack = []; 
                    updateUI();
                }
            } catch (err) {
                alert("ファイルの読み込みに失敗しました。");
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    });

    initGame();

</script>
</body>
</html>
